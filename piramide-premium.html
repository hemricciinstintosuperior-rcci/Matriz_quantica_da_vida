<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>

<style>
body{font-family:"Times New Roman",serif;background:#f4f4f4;margin:0;}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}

.capa{background:white;text-align:center;padding:120px 40px;}
.logo{width:650px;margin-bottom:40px;}
.titulo{font-size:42px;letter-spacing:3px;}
.subtitulo{font-size:22px;margin-top:10px;}
.nomeCliente{margin-top:70px;font-size:24px;}

.secao{
 max-width:1000px;margin:40px auto;background:white;
 padding:40px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.05);
}

.texto{white-space:pre-line;font-size:19px;line-height:1.6;}
.tituloPiramide{text-align:center;font-size:28px;margin-bottom:30px;}

.piramide{display:flex;flex-direction:column;align-items:center;margin:40px 0;}
.linha{display:flex;justify-content:center;margin:2px 0;}
.num{
 width:28px;height:28px;border-radius:6px;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;font-size:16px;margin:2px;color:#fff;
 background:#63c7d6;
}
.num.negativo{background:#e74c3c;}
.num.especial{background:#f1c40f;color:#000;}
.num.financeiro{background:#2ecc71;}

.rodape{text-align:right;margin-top:80px;font-size:12px;color:#777;}
@media print{.no-print{display:none!important;}}


/* =========================
📱 RESPONSIVO MOBILE
========================= */
@media screen and (max-width: 768px){

  body{
    background:#fff;
  }

  .capa{
    padding:60px 20px;
  }

  .logo{
    width:90%;
    max-width:320px;
  }

  .titulo{
    font-size:28px;
    letter-spacing:1px;
  }

  .subtitulo{
    font-size:18px;
  }

  .nomeCliente{
    font-size:18px;
    margin-top:40px;
  }

  .secao{
    margin:20px 12px;
    padding:25px 18px;
    border-radius:14px;
  }

  .texto{
    font-size:16px;
    line-height:1.7;
  }

 

  /* PIRÂMIDE MOBILE */
  .num{
    width:22px;
    height:22px;
    font-size:16px;
    margin:1px;
    border-radius:5px;
  }

  .linha{
    margin:1px 0;
  }

  /* botão */
  button{
    width:90%;
    padding:14px;
    font-size:18px;
    border-radius:10px;
  }

}

 
</style>
</head>

<body>
<div id="conteudo">Gerando relatório...</div>

<script>
// valida token
// 1. Recebe e valida os dados (Sempre no topo)
const dadosDB = localStorage.getItem("relatorioPiramide");
if(!dadosDB){
    document.body.innerHTML = "<h2 style='text-align:center; margin-top:100px;'>Nenhum dado encontrado. Por favor, gere a matriz novamente.</h2>";
    throw new Error();
}
const relatorio = JSON.parse(dadosDB);

// 2. FUNÇÃO DE FORMATAÇÃO (A que coloca o nome em negrito)
function formatarTexto(texto, nomeCompleto) {
    if (!texto) return "";
    let primeiroNome = nomeCompleto.trim().split(' ')[0];
    primeiroNome = primeiroNome.charAt(0).toUpperCase() + primeiroNome.slice(1).toLowerCase();
    return texto.replace(/você/gi, `<strong>${primeiroNome}</strong>`);
}

// 3. SEUS TEXTOS (MANTENHA OS QUE VOCÊ JÁ TEM)
const textos = {
  introducaoMetodo: `A Pirâmide Quântica representa...`, // COLE SEU TEXTO AQUI
  introRegente: `O Regente é o coração...`, // COLE SEU TEXTO AQUI
  introNegativas: `As Sequências Negativas...`, // COLE SEU TEXTO AQUI
  introEspeciais: `As Sequências Especiais...`, // COLE SEU TEXTO AQUI
  introFinanceiro: `A análise da Sequência...`, // COLE SEU TEXTO AQUI
  introVigencias: `As Vigências representam...`, // COLE SEU TEXTO AQUI
  agradecimento: `Este relatório foi desenvolvido...` // COLE SEU TEXTO AQUI
};

// 4. MONTAGEM DO HTML (Ajustado para usar a função formatarTexto)
const conteudoDiv = document.getElementById("conteudo");

conteudoDiv.innerHTML = `
<div class="capa">
    <img class="logo" src="https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/icon-192.png">
    <div class="titulo" style="font-size:32px; font-weight:bold; margin-top:20px;">Matriz Quântica da Vida</div>
    <div class="nomeCliente"><b>${relatorio.nome}</b><br>${relatorio.data}</div>
</div>

<div class="secao">
    <h2>Introdução ao Método</h2>
    <div class="texto">${formatarTexto(textos.introducaoMetodo, relatorio.nome)}</div>
</div>

<div class="secao">
    <h2>Como interpretar o relatório</h2>
    <div class="texto">
        <b>Regente</b><br>${textos.introRegente}<br><br>
        <b>Sequências Numéricas Negativas</b><br>${textos.introNegativas}<br><br>
        <b>Sequências Especiais</b><br>${textos.introEspeciais}<br><br>
        <b>Sequência Financeira</b><br>${textos.introFinanceiro}<br><br>
        <b>Vigências</b><br>${textos.introVigencias}
    </div>
</div>

<div class="secao">${relatorio.piramidePrincipal}</div>
<div class="secao">${relatorio.piramidePessoal}</div>
<div class="secao">${relatorio.piramideSocial}</div>
<div class="secao">${relatorio.piramideDestino}</div>

<div class="secao">
    <h2>Considerações Finais</h2>
    <div class="texto">${formatarTexto(textos.agradecimento, relatorio.nome)}</div>
</div>

<div class="rodape">Relatório Confidencial • Instinto Superior</div>

<div style="text-align:center;margin:40px;">
    <button class="no-print" onclick="window.print()">📄 Baixar PDF</button>
</div>
`;

// 5. AUTO PRINT
setTimeout(() => {
    window.scrollTo(0,0);
    window.print();
}, 1500);

// Bloqueios
document.oncontextmenu = () => false;
document.onselectstart = () => false;

</script>
</body>

</html>
