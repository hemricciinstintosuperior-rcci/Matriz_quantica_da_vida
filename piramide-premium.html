<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>

<style>
/* MANTENDO SUA ESTILIZAÇÃO ORIGINAL */
body{font-family:"Times New Roman",serif;background:#f4f4f4;margin:0; color:#1a1a1a;}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}

.capa{background:white;text-align:center;padding:120px 40px; page-break-after: always;}
.logo{width:550px;margin-bottom:40px;}
.nomeCliente{margin-top:70px;font-size:28px; border-top: 1px solid #ccc; padding-top: 20px; display: inline-block;}

.secao{
 max-width:900px;margin:30px auto;background:white;
 padding:50px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.05);
 page-break-inside: avoid;
}

.texto{white-space:pre-line;font-size:18px;line-height:1.6; text-align: justify;}
.tituloPiramide{text-align:center;font-size:32px;margin-bottom:30px; font-weight: bold; color: #000; text-transform: uppercase;}

/* ESTILO DAS INTROS DENTRO DAS SEÇÕES */
.intro-subsecao {
    font-size: 15px;
    color: #555;
    font-style: italic;
    margin-bottom: 15px;
    line-height: 1.4;
    border-left: 3px solid #ccc;
    padding-left: 10px;
}

.num{
 width:24px;height:24px;border-radius:4px;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;font-size:14px; color:#000;
 background:#28d3ee;
}

.num.negativo{background:#FF0000 !important; color:#fff !important;}
.num.especial{background:#f6c445 !important; color:#000 !important;}
.num.financeiro{background:#34c759 !important; color:#fff !important;}

.box { border: 1px solid #ddd; padding: 20px; margin: 15px 0; border-radius: 8px; background: #fafafa; }

.rodape{text-align:center;margin-top:50px;font-size:12px;color:#999; border-top: 1px solid #eee; padding-top: 20px;}

button{ background: #facc15; border: none; padding: 15px 30px; font-weight: bold; font-size: 18px; border-radius: 8px; cursor: pointer; }

@media print{
    .no-print{display:none!important;}
    body { background: white; }
    .secao { box-shadow: none; margin: 0 auto; width: 100%; padding: 30px; }
}
</style>
</head>

<body>
<div id="conteudo">Gerando seu relatório quântico premium...</div>

<script>
const dados = localStorage.getItem("relatorioPiramide");
if(!dados){
    document.body.innerHTML="<div class='secao'>ERRO: Nenhum dado encontrado.</div>";
    throw new Error();
}
const relatorio = JSON.parse(dados);

// DEFINIÇÃO DAS INTROS PARA CADA BLOCO
const intros = {
    regente: `O Regente é a frequência fundamental que governa esta matriz específica, indicando sua postura central e essência vibracional.`,
    negativas: `As Sequências Negativas revelam bloqueios ou desafios repetitivos que podem drenar sua energia se não forem conscientizados.`,
    especiais: `Os Impactos Especiais são janelas de eventos específicos, trazendo oportunidades ou avisos pontuais de grande relevância.`,
    financeiro: `O Fluxo Financeiro identifica as janelas de prosperidade e colheita material baseadas na vibração 99/9 da sua matriz.`,
    vigencias: `As Vigências cronológicas mostram como as potências numerológicas se distribuem ao longo da sua linha do tempo.`
};

// FUNÇÃO DE MONTAGEM COM TÍTULOS E INTROS
function montarSecaoPremium(titulo, conteudoHtml){
    if(!conteudoHtml) return "";
    
    // Aqui nós injetamos os títulos e as intros no lugar certo antes do conteúdo do gerador
    return `
    <div class="secao">
        <div class="tituloPiramide">${titulo}</div>
        <div class="conteudo-bloco">
            ${conteudoHtml}
        </div>
    </div>`;
}

// RENDERIZAÇÃO FINAL
document.getElementById("conteudo").innerHTML = `
<div class="capa">
    <img class="logo" src="https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/matriz.png">
    <div class="nomeCliente">
        Relatório Personalizado para:<br>
        <strong>${relatorio.nome}</strong><br>
        Nascimento: ${relatorio.data}
    </div>
</div>

<div class="secao">
    <h2>Introdução ao Método</h2>
    <div class="texto">Este relatório detalha as quatro camadas da sua existência: a realidade prática, seus sentimentos profundos, sua interação com o ambiente e o seu propósito de destino.</div>
</div>

${montarSecaoPremium("Matriz da Vida", relatorio.abaPrincipal)}
${montarSecaoPremium("Matriz Pessoal", relatorio.abaPessoal)}
${montarSecaoPremium("Matriz Social", relatorio.abaSocial)}
${montarSecaoPremium("Matriz de Destino", relatorio.abaDestino)}

<div class="secao">
    <h2>Considerações Finais</h2>
    <div class="texto">Utilize este mapa como um guia para navegar seus ciclos com mais clareza e poder de decisão.</div>
    <div class="rodape">Relatório Confidencial • Instinto Superior • 2026</div>
</div>

<div class="btn-container no-print">
    <button onclick="window.print()">📄 Baixar Relatório em PDF</button>
</div>
`;

document.oncontextmenu = () => false;
</script>
</body>
</html>
