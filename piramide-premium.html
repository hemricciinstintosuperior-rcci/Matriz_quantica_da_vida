<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>

<style>
/* CONFIGURAÇÕES DE BASE */
body{font-family:"Times New Roman",serif;background:#f4f4f4;margin:0; color:#1a1a1a;}
*{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}

.capa{background:white;text-align:center;padding:120px 40px; page-break-after: always;}
.logo{width:550px;margin-bottom:40px;}
.nomeCliente{margin-top:70px;font-size:28px; border-top: 1px solid #ccc; padding-top: 20px; display: inline-block;}

.secao{
 max-width:900px;margin:30px auto;background:white;
 padding:50px;border-radius:10px;box-shadow:0 0 20px rgba(0,0,0,.05);
 page-break-inside: avoid;
}

.texto{white-space:pre-line;font-size:18px;line-height:1.6; text-align: justify;}
.tituloPiramide{text-align:center;font-size:28px;margin-bottom:30px; font-weight: bold; color: #111;}

/* ESTILIZAÇÃO DAS PIRÂMIDES NO PREMIUM */
.piramide{display:flex;flex-direction:column;align-items:center;margin:30px 0; font-family: monospace;}
.linha{display:flex;justify-content:center;margin:1px 0; gap: 4px;}
.num{
 width:24px;height:24px;border-radius:4px;
 display:flex;align-items:center;justify-content:center;
 font-weight:bold;font-size:14px; color:#000;
 background:#28d3ee;
}

.num.negativo{background:#FF0000 !important; color:#fff !important;}
.num.especial{background:#f6c445 !important; color:#000 !important;}
.num.financeiro{background:#34c759 !important; color:#fff !important;}

/* ESTILO DOS NOVOS ALERTAS DE VIGÊNCIA */
.box { 
    border: 1px solid #ddd; 
    padding: 20px; 
    margin: 15px 0; 
    border-radius: 8px;
    background: #fafafa;
    text-align: left; /* Garante alinhamento à esquerda nos textos */
}

.rodape{text-align:center;margin-top:50px;font-size:12px;color:#999; border-top: 1px solid #eee; padding-top: 20px;}

.btn-container { text-align:center; margin: 40px 0; }
button{ 
    background: #facc15; border: none; padding: 15px 30px; 
    font-weight: bold; font-size: 18px; border-radius: 8px; cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

@media print{
    .no-print{display:none!important;}
    body { background: white; }
    .secao { box-shadow: none; margin: 0 auto; width: 100%; padding: 30px; }
}

@media screen and (max-width: 768px){
  .logo{ width:100%; }
  .secao{ margin:10px; padding:20px; }
  .num { width: 18px; height: 18px; font-size: 11px; }
}
</style>
</head>

<body>
<div id="conteudo">Gerando seu relatório quântico premium...</div>

<script>
// 1. Captura e valida os dados
const dadosJson = localStorage.getItem("relatorioPiramide");
if(!dadosJson){
    document.getElementById("conteudo").innerHTML = "<div class='secao'>ERRO: Nenhum dado encontrado. Por favor, volte ao gerador e clique em GERAR AS MATRIZES.</div>";
} else {
    const relatorio = JSON.parse(dadosJson);

    const textos = {
        introducaoMetodo: `A Pirâmide Quântica representa um dos métodos mais sofisticados de autoconhecimento da atualidade. Através da decodificação da frequência numérica do seu nome e data de nascimento, conseguimos mapear os fluxos de energia que regem sua realidade física, emocional e social.`,
        agradecimento: `Este relatório foi desenvolvido exclusivamente para apoiar o seu processo de expansão e clareza sobre sua jornada de vida.`
    };

    // 2. Monta o HTML final corrigido
    document.getElementById("conteudo").innerHTML = `
        <div class="capa">
            <img class="logo" src="https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/matriz.png" alt="Logo">
            <div class="nomeCliente"><b>${relatorio.nome}</b><br>${relatorio.data}</div>
        </div>

        <div class="secao">
            <h2>Introdução ao Método</h2>
            <div class="texto">${textos.introducaoMetodo}</div>
        </div>

        <div class="secao">
            <h2 style="text-align:center;">Sua Matriz de Realidade (Mapa Mestre)</h2>
            <div class="piramide">${relatorio.piramidePrincipal || "Matriz não gerada."}</div>
        </div>

        <div class="secao">
            ${relatorio.conteudoUnificado || "<p>Nenhum ciclo unificado encontrado.</p>"}
        </div>

        <div class="secao">
            <h2>Considerações Finais</h2>
            <div class="texto">${textos.agradecimento}</div>
        </div>

        <div class="rodape">Relatório Confidencial • Instinto Superior</div>

        <div class="btn-container no-print">
            <button onclick="window.print()">📄 Baixar Relatório em PDF</button>
        </div>
    `;
}

// Proteções
document.oncontextmenu = () => false;
document.onselectstart = () => false;
</script>
</body>
</html>
