<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Premium • Pirâmide Quântica</title>
<style>
  body { font-family: "Times New Roman", serif; background: #f9f9f9; margin:0; color:#111; }
  h1,h2,h3 { text-align:center; margin-bottom:15px; }
  .container { max-width:900px; margin:20px auto; padding:20px; background:white; border-radius:10px; box-shadow:0 0 15px rgba(0,0,0,0.05); }
  .abas { text-align:center; margin-bottom:20px; }
  .abas button { background:#facc15; color:#000; border:none; padding:10px 20px; margin:0 5px; cursor:pointer; border-radius:5px; font-weight:bold; transition:0.2s; }
  .abas button.active { background:#111827; color:#fff; }
  .aba { display:none; }
  .aba.active { display:block; }
  .piramide { display:flex; flex-direction:column; align-items:center; margin:20px 0; font-family: monospace; }
  .linha { display:flex; justify-content:center; gap:4px; margin:2px 0; }
  .num { width:20px; height:20px; display:flex; align-items:center; justify-content:center; font-weight:bold; border-radius:4px; background:#02B0F2; color:#000; }
  .num.negativo { background:#FF0000; color:#fff; }
  .num.especial { background:#b8860b; color:#fff; }
  .num.financeiro { background:#34c759; color:#fff; }
  .blocoRelatorio { margin-bottom:20px; padding:15px; border-left:5px solid #facc15; background:#f4f4f4; }
  .blocoRelatorio h2 { margin-top:0; }
  p { line-height:1.5; text-align:justify; }
</style>
</head>
<body>
   <div class="btn-container">
        <button onclick="window.print()">📄 Baixar Relatório em PDF</button>
    </div>
<div class="container">
  
  <h1>Relatório Premium • Pirâmide Quântica</h1>
  <div class="abas">
    <button onclick="mostrarAbaPremium('principal')" class="active">Principal / Vida</button>
    <button onclick="mostrarAbaPremium('pessoal')">Pessoal</button>
    <button onclick="mostrarAbaPremium('social')">Social</button>
    <button onclick="mostrarAbaPremium('destino')">Destino</button>
  </div>

  <div id="aba_principal" class="aba active"></div>
  <div id="aba_pessoal" class="aba"></div>
  <div id="aba_social" class="aba"></div>
  <div id="aba_destino" class="aba"></div>
</div>

<script>
  // Função para alternar abas
  function mostrarAbaPremium(nome){
      document.querySelectorAll('.aba').forEach(a=>a.classList.remove('active'));
      document.getElementById('aba_'+nome).classList.add('active');

      document.querySelectorAll('.abas button').forEach(b=>b.classList.remove('active'));
      event.currentTarget.classList.add('active');
  }

  // Pega dados do localStorage gerados pelo index
  const relatorio = JSON.parse(localStorage.getItem('relatorioPiramide'));
  if(relatorio){
      document.getElementById('aba_principal').innerHTML = relatorio.abaPrincipal;
      document.getElementById('aba_pessoal').innerHTML = relatorio.abaPessoal;
      document.getElementById('aba_social').innerHTML = relatorio.abaSocial;
      document.getElementById('aba_destino').innerHTML = relatorio.abaDestino;
  }
</script>

</body>
</html>
