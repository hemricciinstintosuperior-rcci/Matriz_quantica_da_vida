<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Premium - Instinto Superior</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CONFIGURAÇÕES DE IMPRESSÃO E PÁGINA A4 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Arial', sans-serif; 
            background: #f0f0f0; 
            color: #333; 
        }

        /* Container que centraliza o relatório na tela */
        .container-master {
            width: 210mm;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }

        /* Estilo das Capas de Transição (Ocupam a folha toda) */
        .capa-transicao {
            height: 297mm;
            width: 210mm;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #0f2a36; /* Azul Petróleo Luxo */
            color: #ffffff;
            position: relative;
            overflow: hidden;
            page-break-after: always;
            padding: 40px;
        }

        .capa-transicao h2 {
            font-family: 'Cinzel', serif;
            font-size: 32px;
            color: #d97a1e; /* Dourado */
            text-transform: uppercase;
            margin: 20px 0;
        }

        .capa-transicao p {
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            opacity: 0.9;
            max-width: 80%;
        }

        /* Estilo das Páginas de Conteúdo (Texto e Gráficos) */
        .pagina-conteudo {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm; /* Margem de segurança para o PDF */
            background: white;
            page-break-after: always;
            position: relative;
        }

        /* Botão flutuante para gerar PDF (não sai na impressão) */
        .btn-pdf-fixo {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #cc0000;
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* CSS ESPECÍFICO PARA O PDF */
        @media print {
            @page { size: A4; margin: 0; }
            .btn-pdf-fixo { display: none !important; }
            body { background: white !important; }
            .container-master { width: 210mm !important; margin: 0 !important; }
            
            .capa-transicao {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }

        /* Estilos dos Gráficos/Barras que você já usa */
        .barra-vermelha { height: 14px; background: #ddd; border-radius: 7px; overflow: hidden; margin: 10px 0; }
        .progresso-vermelho { height: 100%; background: linear-gradient(90deg, #d97a1e, #827108); }
        h3 { color: #d97a1e; text-transform: uppercase; margin-bottom: 10px; font-family: 'Cinzel', serif; }
        .texto-res { line-height: 1.6; text-align: justify; margin-bottom: 20px; font-size: 17px; }
    </style>
</head>
<body>

    <button class="btn-pdf-fixo" onclick="window.print()">GERAR MEU PDF</button>

    <div id="render-relatorio" class="container-master">
        </div>

    <script>
        // 1. Pega os dados que o seu "Gerador" enviou pelo LocalStorage
        const dados = JSON.parse(localStorage.getItem('relatorioPiramide'));

        if (!dados) {
            document.getElementById('relatorioPiramide').innerHTML = "<h1>Nenhum dado encontrado. Gere o relatório novamente.</h1>";
        } else {
            // 2. Monta o HTML com as capas de transição fixas
            let htmlFinal = `
                <div class="capa-transicao">
                    <img src="https://hemricciinstintosuperior-rcci.github.io/Trabalho_venda_Numerologia/matriz.png" style="width: 300px; margin-bottom: 20px;">
                    <h2>Matriz Quântica da Vida</h2>
                    <div style="width: 100px; height: 2px; background: #d97a1e; margin: 10px auto;"></div>
                    <h1 style="font-size: 40px; margin: 15px 0;">${dados.nome}</h1>
                    <p>Relatório Personalizado baseado em Numerologia Cabalística e Moderna</p>
                </div>

                <div class="pagina-conteudo">
                    ${dados.conteudoPrincipal || ''}
                </div>

                <div class="capa-transicao">
                    <span style="letter-spacing: 5px;">PARTE 02</span>
                    <h2>Gráficos de Expressão Natural</h2>
                    <img src="https://hemricciinstintosuperior-rcci.github.io/Trabalho_venda_Numerologia/INSTINTOFOTOO.png" style="width: 250px; opacity: 0.3; margin: 30px 0;">
                    <p>A análise profunda dos seus planos mentais, físicos e emocionais.</p>
                </div>

                <div class="pagina-conteudo">
                    ${dados.conteudoPessoal || ''}
                </div>

                <div class="capa-transicao">
                    <span style="letter-spacing: 5px;">PARTE 03</span>
                    <h2>A Percepção Social</h2>
                    <p>Como sua energia interage com o coletivo e o ambiente ao seu redor.</p>
                </div>

                <div class="pagina-conteudo">
                    ${dados.conteudoSocial || ''}
                </div>

                <div class="capa-transicao">
                    <span style="letter-spacing: 5px;">PARTE 04</span>
                    <h2>Destino e Evolução</h2>
                    <p>As potências nativas que direcionam sua missão de vida.</p>
                </div>

                <div class="pagina-conteudo">
                    ${dados.conteudoDestino || ''}
                </div>
            `;

            document.getElementById('relatorioPiramide').innerHTML = htmlFinal;
        }
    </script>
</body>
</html>
