<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pirâmide da Vida Quântica</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    
<style>
/* Reset de Impressão para o PDF não sair "zoado" */
@media print {
    .container-master { 
        width: 100% !important; 
        margin: 0 !important; 
        padding: 0 !important;
        box-shadow: none !important;
        border: none !important;
    }
    .evitar-corte { page-break-inside: avoid; }
}

.container-master {
    width: 100%; /* Seu padrão para PDF A4 no PC */
    margin: auto;
    font-family: 'Montserrat', sans-serif;
    color: #333;
}

/* Grade das Pirâmides */
.grid-quatro-piramides {
    display: grid;
    grid-template-columns: 1fr 1fr; /* Duas por linha */
    gap: 20px;
    margin: 40px 0;
}

.bloco-piramide {
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    background: #fff;
}

.bloco-piramide h3 {
    font-size: 14px;
    color: #827108;
    text-transform: uppercase;
    margin-bottom: 10px;
}

/* Estilo do Bloco Único de Texto */
.card-integrado {
    border-left: 6px solid #827108;
    background: #fdfdfd;
    margin-bottom: 30px;
    border-radius: 0 15px 15px 0;
    overflow: hidden;
}

.titulo-ciclo {
    background: #f4f4f4;
    padding: 10px 20px;
    font-weight: bold;
    border-bottom: 1px solid #eee;
}

.conteudo-vibracoes { padding: 20px; }

.vibracao-row { margin-bottom: 15px; }

.vibracao-row b { display: block; color: #827108; font-size: 15px; }

.card-input-premium {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    max-width: 800px;
    margin: 20px auto;
    border: 1px solid #eee;
}

.input-group {
    margin-bottom: 20px;
}

.input-group label {
    display: block;
    font-size: 12px;
    font-weight: bold;
    color: #827108; /* Seu Dourado */
    margin-bottom: 8px;
    letter-spacing: 1.5px;
}

.input-group input {
    width: 100%;
    padding: 12px 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 16px;
    font-family: 'Montserrat', sans-serif;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #827108;
    box-shadow: 0 0 8px rgba(130, 113, 8, 0.2);
}

.botoes-acao {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.btn-gerar, .btn-pdf {
    padding: 15px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Montserrat', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.btn-gerar {
    background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
    color: #4a3b00;
}

.btn-pdf {
    background: #111827;
    color: #fff;
}

.btn-gerar:hover, .btn-pdf:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}


/* Estilo da Pirâmide - Igual ao Estudo Numerológico */
.piramide {
    display: flex;
    flex-direction: column;
    align-items: center; /* Centraliza as linhas para formar o triângulo */
    gap: 5px;
    margin: 20px 0;
    width: 100%;
}

.piramide .linha {
    display: flex;
    justify-content: center;
    gap: 10px; /* Espaço entre os números na mesma linha */
}

.piramide .num {
    width: 15px;
    height: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    border-radius: 50%;
    background: #f8f9fa; /* Fundo suave para os números */
    border: 1px solid #eee;
}

/* Cores de destaque para as sequências (se quiser usar) */
.num.negativo { background-color: #ffcccc; color: #d32f2f; border-color: #d32f2f; }
.num.especial { background-color: #fff3cd; color: #856404; border-color: #856404; }
.num.financeiro { background-color: #d4edda; color: #155724; border-color: #155724; }

/* Para as pirâmides menores no topo */
.compacta {
    transform: scale(0.8);
    margin: -10px 0;
}

.logo-capa {
    width: 700px !important; /* Tamanho ideal para uma folha A4 */
    max-width: 90%;          /* Garante que não ultrapasse a margem da folha */
    height: auto !important;  /* Mantém a proporção sem esticar */
    margin: 0 auto 40px auto; /* Centraliza horizontalmente e dá espaço para o nome */
    display: block !important;
}

.capa-cliente {
    width: 100%;
    text-align: center; /* Centraliza o nome e a data */
    margin-top: 20px;
}

.logo-conclusao {
    width: 2000px;
    height: auto;
    margin-top: 0px;
    opacity: 0.9;
}

 html, body {
    width: 100%;
    max-width: 100%;
}   
* {
    box-sizing: border-box;
}  
    

@media (max-width: 600px) {
    .botoes-acao { grid-template-columns: 1fr; }
}


    
/* Celular */
@media (max-width: 768px) {
    .container-master { width: 100% !important; }
    .grid-quatro-piramides { grid-template-columns: 1fr; }
}


@media (max-width: 768px) {
    .container-master { width: 100% !important; overflow-x: hidden; }
    .piramide .num { width: 15px; height: 15px; font-size: 11px; } /* Diminui a bola no celular */
    .piramide .linha { gap: 4px; } 
}


@media print {
    /* Força o conteúdo a caber na largura da folha A4 */
    body { background: none; }
    .container-master { 
        width: 100% !important; 
        margin: 0 !important; 
        padding: 0 !important;
    }
    
    /* Diminui o tamanho das pirâmides no PDF para caberem 2 por linha ou as 4 */
    .piramide {
        transform: scale(0.7); /* Diminui em 30% no papel */
        transform-origin: top center;
        margin-bottom: -50px; /* Compensa o espaço vazio do scale */
    }

    .grid-quatro-piramides {
        gap: 10px;
        margin: 10px 0;
    }

    .bloco-piramide {
        border: none !important; /* Remove bordas para ficar mais limpo no PDF */
        padding: 5px !important;
    }

    .evitar-corte { 
        page-break-inside: avoid; /* Não deixa um texto quebrar no meio de duas páginas */
    }

    /* Esconde os botões e inputs no PDF */
    .card-input-premium, .botoes-acao, button {
        display: none !important;
    }
}

    
    
</style>
</head>

  <div class="card-input-premium">
    <div class="input-group">

<div id="resultado-final" style="width: 110%; max-width: 800px; margin: 0 auto;">

<script src="textos.js"></script>

<script>
// 1. Função que limpa e personaliza qualquer texto que venha do banco
function personalizarTexto(texto) {
    if (!texto) return "";
    const nomeCompleto = document.getElementById("nome").value.trim();
    const primeiroNome = nomeCompleto.split(" ")[0] || "você";
    
    let processado = texto.replace(/você/g, `<strong>${primeiroNome}</strong>`);
    
    // Divide o texto por quebras de linha e cria parágrafos reais
    return processado.split('\n').map(paragrafo => {
        if(paragrafo.trim().length > 0) {
            return `<p style="text-align: left;">${paragrafo}</p>`;
        }
        return "";
    }).join("");
}
 
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 3;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let b = [...base];
    let linhas=[b];
    while(b.length>1){
        let nova=[];
        for(let i=0;i<b.length-1;i++){ nova.push(reduzir(b[i]+b[i+1])); }
        linhas.push(nova);
        b=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// --- FUNÇÃO DE APOIO: CÁLCULO LINEAR VERTICAL ---
function calcularVigenciaLinearVertical(coluna, tamanhoSeq, cronograma, arcanosTopo) {
    let detalhes = [];
    // Cada número da sequência pega a potência da sua própria coluna no topo
    for (let i = 0; i < tamanhoSeq; i++) {
        let indiceColuna = coluna + i;
        let arcRef = arcanosTopo[indiceColuna]; 
        let periodo = cronograma.find(p => p.indiceArcano === indiceColuna);
        
        if (periodo) {
            detalhes.push({
                potencia: arcRef,
                duracao: parseInt(arcRef.toString()[0]) || 1,
                idadeIni: periodo.idadeIni,
                idadeFim: periodo.idadeFim
            });
        }
    }
    return detalhes;
}

function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function calcularPeriodoSequencia(periodoBase, duracaoTotal) {

    let [dia, mes, ano] = periodoBase.ini.split("/").map(Number);

    let dataIni = new Date(ano, mes - 1, dia);
    let dataFim = new Date(dataIni);

    dataFim.setFullYear(dataFim.getFullYear() + duracaoTotal);

    return {
        ini: dataIni.toLocaleDateString('pt-BR'),
        fim: dataFim.toLocaleDateString('pt-BR')
    };
}
 




function montarSecaoMatriz(titulo, matriz, bancoDeTextos, introPiramide) {
    // 1. Identifica o Regente (o último número da ponta da pirâmide)
    const ultimaLinha = matriz[matriz.length - 1];
    const regente = ultimaLinha[0];
    
    // 2. Busca o resultado específico (1 ao 9) no banco de textos que passamos
    const resultadoTexto = bancoDeTextos[regente] || "Resultado não encontrado para este número.";

    let h = `
    <div class="page evitar-corte" style="margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 40px;">
        <h2 style="text-align:center; color:#827108; text-transform: uppercase; letter-spacing: 2px;">Matriz de ${titulo}</h2>
        
        <div class="texto-introducao" style="font-style: italic; color: #555; margin-bottom: 20px;">
            ${personalizarTexto(introPiramide)}
        </div>

        <div style="margin: 20px 0;">
            ${desenhar(matriz)}
        </div>

        <div class="resultado-regente-container" style="background: #fdfaf0; border: 1px solid #e6d5a8; border-radius: 12px; padding: 25px; margin-top: 20px;">
            <h3 style="color: #827108; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">🔱</span> 
                RESULTADO DO REGENTE ${regente} - ${titulo}
            </h3>
            <div class="texto-resultado-pratico" style="font-size: 16px; line-height: 1.7; color: #333;">
                ${personalizarTexto(resultadoTexto)}
            </div>
        </div>
    </div>`;
    return h;
}



function gerarLoopNegativo(mV, mP, mS, mD, crono) {
    let h = "";
    // Detectamos as sequências negativas de cada pirâmide
    // (Assumindo que sua função detectarSequencias retorna as repetições)
    
    crono.forEach((periodo) => {
        // Buscamos os números das linhas das pirâmides para este período
        // Aqui usamos a lógica de pegar o arco correspondente ao índice
        const nV = mV[0][periodo.indiceArcano]; 
        const nP = mP[0][periodo.indiceArcano];
        const nS = mS[0][periodo.indiceArcano];
        const nD = mD[0][periodo.indiceArcano];

        // Só montamos o card se houver algo relevante (opcional) ou fazemos o loop fixo
        h += `
        <div class="card-integrado evitar-corte" style="border-left-color: #d32f2f; background: #fff5f5;">
            <div class="titulo-ciclo" style="background: #fee2e2; color: #b91c1c;">
                ⚠️ DESAFIOS E BLOQUEIOS: ${periodo.idadeIni} a ${periodo.idadeFim} anos
            </div>
            <div class="conteudo-vibracoes">
                <div class="vibracao-row"><b style="color:#d32f2f;">🚫 VIDA:</b> ${personalizarTexto(textosSeqNegVida[nV] || "Sem bloqueios severos mapeados para esta vibração.")}</div>
                <div class="vibracao-row"><b style="color:#d32f2f;">🚫 PESSOAL:</b> ${personalizarTexto(textosSeqNegPessoal[nP] || "Fluxo pessoal em harmonia.")}</div>
                <div class="vibracao-row"><b style="color:#d32f2f;">🚫 SOCIAL:</b> ${personalizarTexto(textosSeqNegSocial[nS] || "Interações sociais protegidas.")}</div>
                <div class="vibracao-row"><b style="color:#d32f2f;">🚫 DESTINO:</b> ${personalizarTexto(textosSeqNegDestino[nD] || "Caminho de destino livre de obstruções.")}</div>
            </div>
        </div>`;
    });
    return h;
}


function extrairNegativasSincronizadas(mV, mP, mS, mD, crono, topoV) {
    let html = "";
    let encontrou = false;
    let sequenciasProcessadas = new Set();

    // Varre cada linha da Matriz da Vida (Guia Mestre)
    mV.forEach((linha, i) => {
        let j = 0;
        while (j < linha.length) {
            let num = linha[j];
            let cont = 1;
            // Conta quantos números iguais aparecem em sequência (3 ou mais)
            while (j + cont < linha.length && linha[j + cont] === num) {
                cont++;
            }

            if (cont >= 3) {
                encontrou = true;
                
                // Evita duplicatas se a mesma sequência aparecer em contextos repetidos
                let chaveUnica = `lin-${i}-col-${j}-num-${num}`;
                if (sequenciasProcessadas.has(chaveUnica)) {
                    j += cont;
                    continue;
                }
                sequenciasProcessadas.add(chaveUnica);

                // --- CÁLCULO DE VIGÊNCIA (Soma das Potências do Topo) ---
                let duracaoTotal = 0;
                // Na pirâmide, conforme descemos as linhas (i), a coluna real (offset) muda
                // Mas para sincronizar com o Topo (Vibração Temporal), usamos o índice J + a compensação da linha
                for (let k = 0; k < cont; k++) {
                    let colReal = j + k + Math.floor(i / 2); 
                    if (colReal < topoV.length) {
                        duracaoTotal += parseInt(topoV[colReal].toString()[0]) || 1;
                    }
                }

                // Sincroniza com o cronograma de 100 anos
                let idxCrono = j + Math.floor(i / 2);
                let periodoBase = crono[idxCrono] || crono[0];
                let datas = calcularPeriodoSequencia(periodoBase, duracaoTotal);
                let idadeFim = periodoBase.idadeIni + duracaoTotal;

                // Captura o resultado das 4 pirâmides na mesma posição exata
                const resV = mV[i][j];
                const resP = mP[i][j];
                const resS = mS[i][j];
                const resD = mD[i][j];

                html += `
                <div class="card-integrado evitar-corte" style="border-left: 6px solid #ff0000; margin-bottom: 25px;">
                    <div class="titulo-ciclo" style="background: #fee2e2; color: #b91c1c;">
                        ⚠️ ALERTA DE BLOQUEIO: DOS ${periodoBase.idadeIni} AOS ${idadeFim} ANOS
                    </div>
                    <div class="conteudo-vibracoes">
                        <p style="font-size: 14px; color: #111827; margin-bottom: 15px; border-bottom: 1px dashed #ff0000; padding-bottom: 5px;">
                            📅 <b>Período:</b> de ${periodoBase.ini} até ${datas.fim} (${duracaoTotal} anos)
                        </p>
                        
                        <div class="vibracao-row"><b>🚫 VIDA (${resV}${resV}${resV}):</b> ${personalizarTexto(textosSeqNegVida[resV] || "Bloqueio no fluxo vital.")}</div>
                        <div class="vibracao-row"><b>🚫 PESSOAL (${resP}${resP}${resP}):</b> ${personalizarTexto(textosSeqNegPessoal[resP] || "Desafio na expressão pessoal.")}</div>
                        <div class="vibracao-row"><b>🚫 SOCIAL (${resS}${resS}${resS}):</b> ${personalizarTexto(textosSeqNegSocial[resS] || "Instabilidade nas relações.")}</div>
                        <div class="vibracao-row"><b>🚫 DESTINO (${resD}${resD}${resD}):</b> ${personalizarTexto(textosSeqNegDestino[resD] || "Obstrução no caminho de destino.")}</div>
                    </div>
                </div>`;
                
                j += cont;
            } else {
                j++;
            }
        }
    });

    return encontrou ? html : "<p style='text-align:center;'>Nenhuma sequência negativa crítica detectada.</p>";
}


function extrairFinanceiroSincronizado(mV, mP, mS, mD, crono, topoV) {
    let html = "";
    let encontrou = false;
    let sequenciasProcessadas = new Set();
    
    // Nomes das variáveis de texto conforme seu padrão
    const bV = typeof textosSeqFinancVida !== 'undefined' ? textosSeqFinancVida : {};
    const bP = typeof textosSeqFinancPessoal !== 'undefined' ? textosSeqFinancPessoal : {};
    const bS = typeof textosSeqFinancSocial !== 'undefined' ? textosSeqFinancSocial : {};
    const bD = typeof textosSeqFinancDestino !== 'undefined' ? textosSeqFinancDestino : {};

    const piramides = [
        { matriz: mV, banco: bV, nome: "VIDA", prefixo: "🔱" },
        { matriz: mP, banco: bP, nome: "PESSOAL", prefixo: "👤" },
        { matriz: mS, banco: bS, nome: "SOCIAL", prefixo: "🌎" },
        { matriz: mD, banco: bD, nome: "DESTINO", prefixo: "☄️" }
    ];

    piramides.forEach((pira) => {
        // Varremos até a penúltima linha, pois precisamos checar a linha de baixo
        for (let i = 0; i < pira.matriz.length - 1; i++) {
            let linhaAtual = pira.matriz[i];
            let linhaBaixo = pira.matriz[i + 1];

            for (let j = 0; j < linhaAtual.length - 1; j++) {
                // LÓGICA DO TRIÂNGULO: 9 e 9 em cima, e o 9 abaixo deles
                if (linhaAtual[j] === 9 && linhaAtual[j + 1] === 9 && linhaBaixo[j] === 9) {
                    encontrou = true;

                    let chaveUnica = `fin-triangulo-${pira.nome}-${i}-${j}`;
                    if (sequenciasProcessadas.has(chaveUnica)) continue;
                    sequenciasProcessadas.add(chaveUnica);

                    // --- CÁLCULO DE VIGÊNCIA (Soma das potências do Topo da Vida) ---
                    let duracaoTotal = 0;
                    let offset = Math.floor(i / 2);
                    
                    // Como o triângulo ocupa a largura de 2 números no topo
                    for (let k = 0; k < 2; k++) {
                        let colReal = j + offset + k;
                        if (colReal < topoV.length) {
                            duracaoTotal += parseInt(topoV[colReal].toString()[0]) || 1;
                        }
                    }

                    // SINCRONIA DE DATAS
                    let periodoBase = crono[j + offset] || crono[0];
                    let datas = calcularPeriodoSequencia(periodoBase, duracaoTotal);
                    let idadeFim = periodoBase.idadeIni + duracaoTotal;

                    // Busca o texto pela chave exata "99/9"
                    let textoResultado = pira.banco["99/9"] || bV["99/9"] || "Vibração de fluxo financeiro detectada.";

                    html += `
                    <div class="card-integrado evitar-corte" style="border-left: 6px solid #2e7d32; margin-bottom: 25px; background: #f1f8e9; padding: 15px; border-radius: 8px;">
                        <div class="titulo-ciclo" style="background: #c8e6c9; color: #1b5e20; padding: 8px; font-weight: bold; border-radius: 4px;">
                            💰 FLUXO FINANCEIRO (${pira.nome}): DOS ${periodoBase.idadeIni} AOS ${idadeFim} ANOS
                        </div>

function extrairEspeciaisSincronizadas(mV, mP, mS, mD, crono, topoV) {
    let html = "";
    let encontrou = false;
    let sequenciasProcessadas = new Set();
    
    // Mapeamento de quais pirâmides buscar e quais bancos de texto usar
    const piramides = [
        { matriz: mV, banco: typeof textosSeqEspVida !== 'undefined' ? textosSeqEspVida : {}, nome: "VIDA", prefixo: "🔱", classe: "vida" },
        { matriz: mP, banco: typeof textosSeqEspPessoal !== 'undefined' ? textosSeqEspPessoal : {}, nome: "PESSOAL", prefixo: "👤", classe: "pessoal" },
        { matriz: mS, banco: typeof textosSeqEspSocial !== 'undefined' ? textosSeqEspSocial : {}, nome: "SOCIAL", prefixo: "🌎", classe: "social" },
        { matriz: mD, banco: typeof textosSeqEspDestino !== 'undefined' ? textosSeqEspDestino : {}, nome: "DESTINO", prefixo: "☄️", classe: "destino" }
    ];

    piramides.forEach((pira) => {
        pira.matriz.forEach((linha, i) => {
            for (let j = 0; j < linha.length - 2; j++) {
                let seq = String(linha[j]) + String(linha[j+1]) + String(linha[j+2]);
                
                // Se a sequência existir no banco específico desta pirâmide
                if (pira.banco[seq]) {
                    encontrou = true;
                    
                    // Chave única para não repetir se a sequência "vazar" para linhas próximas
                    let chaveUnica = `${pira.nome}-${i}-${j}-${seq}`;
                    if (sequenciasProcessadas.has(chaveUnica)) continue;
                    sequenciasProcessadas.add(chaveUnica);

                    // --- CÁLCULO DE VIGÊNCIA SEMPRE PELA PIRÂMIDE DA VIDA ---
                    let duracaoTotal = 0;
                    let offset = Math.floor(i / 2); // Compensação da linha na pirâmide
                    
                    for (let k = 0; k < 3; k++) {
                        let colReal = j + offset + k;
                        // BUSCA SEMPRE NO TOPO DA VIDA (topoV)
                        if (colReal < topoV.length) {
                            duracaoTotal += parseInt(topoV[colReal].toString()[0]) || 1;
                        }
                    }

                    // SINCRONIA COM O CALENDÁRIO
                    let periodoBase = crono[j + offset] || crono[0];
                    let datas = calcularPeriodoSequencia(periodoBase, duracaoTotal);
                    let idadeFim = periodoBase.idadeIni + duracaoTotal;

                    html += `
                    <div class="card-integrado evitar-corte" style="border-left: 6px solid #b8860b; margin-bottom: 25px; background: #fffcf5; padding: 15px; border-radius: 8px;">
                        <div class="titulo-ciclo" style="background: #fcf6ba; color: #827108; padding: 8px; font-weight: bold; border-radius: 4px;">
                            ✨ IMPACTO ${pira.nome}: DOS ${periodoBase.idadeIni} AOS ${idadeFim} ANOS
                        </div>
                        <div class="conteudo-vibracoes" style="margin-top:10px;">
                            <p style="font-size: 14px; color: #111827; margin-bottom: 10px; border-bottom: 1px dashed #b8860b; padding-bottom: 5px;">
                                📅 <b>Período:</b> de ${periodoBase.ini} até ${datas.fim} (${duracaoTotal} anos)
                            </p>
                            <div class="vibracao-row">
                                <b>${pira.prefixo} ${pira.nome} (${seq}):</b> ${personalizarTexto(pira.banco[seq])}
                            </div>
                            <p style="font-size: 11px; color: #827108; margin-top: 5px; font-style: italic;">
                                *Vigência calculada pela matriz temporal da Pirâmide da Vida.
                            </p>
                        </div>
                    </div>`;
                }
            }
        });
    });

    return encontrou ? html : "";
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

function detectarPosicoesEspeciais(linhas, bancoEsp){
    let pos=[];
    // Se não vier um banco específico, tenta pegar o global
    const esp = bancoEsp || window.sequenciasEspeciais || {};
    
    linhas.forEach((linha, i) => {
        for(let j=0; j < linha.length - 2; j++){
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if(esp[seq]){ 
                pos.push({linha:i, indice:j}, {linha:i, indice:j+1}, {linha:i, indice:j+2}); 
            }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}
