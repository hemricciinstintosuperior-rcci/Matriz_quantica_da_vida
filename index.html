  <!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Pirâmide da Vida Quântica</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111827">
<style>
body{ font-family: Arial; background:#ffffff; color:#000; text-align:center; }
input,button{ padding:10px; margin:5px; border-radius:6px; border:none; }
input { width: 600px; font-size: 18px; padding: 14px; background-color: #e5e7eb; border: 1px solid #ccc; color: #333; display: block; margin: 10px auto; }
button{ background:#facc15; font-weight:bold; cursor:pointer; }
#resultado{ margin-top:20px; }
.piramide{ font-family: monospace; font-size:12px; line-height:0.7; text-align:center; }
.piramide.compacta{ font-size:12px; line-height:1.2; }
.piramide.compacta .linha{ gap:4px; margin:2px; }
.piramide.compacta .num{ padding:4px 6px; border-radius:6px; font-size:11px; }
.linha{ display:flex; justify-content:center; gap:6px; margin:2px; }
.num{ background:#28d3ee; color:#000; padding:4px 7px; border-radius:6px; font-weight:bold; font-size:16px; min-width:18px; }
.negativo{ background:#FF0000!important; color:#fff !important; box-shadow:0 0 6px rgba(255,0,0,0.6); }
.boxSeq{ background:#fff0f0; border:2px solid #ff4d4d; padding:20px; margin-top:20px; border-radius:10px; }
.box{ background:#ffffff; border:2px solid #000; padding:15px; margin:15px auto; border-radius:10px; max-width:800px; }
.gridRelatorios{ display:grid; grid-template-columns: repeat(3, 1fr); gap:20px; margin-top:25px; }
@media(max-width:900px){ .gridRelatorios{ grid-template-columns:1fr; } }  
.abas button{ background:#22d3ee; border:none; padding:10px 15px; margin:5px; border-radius:8px; cursor:pointer; font-weight:bold; }
.aba{ margin-top:20px; display:none; }
.num.negativo{ background:#ff6b6b; color:white; }
.num.especial{ background:#f6c445; color:#000; box-shadow:0 0 10px rgba(246,196,69,0.8); }
.num.financeiro{ background:#34c759; color:white; box-shadow:0 0 12px rgba(52,199,89,0.9); }
.folhaRelatorio{ background:white; max-width:800px; margin:30px auto; padding:50px; border-radius:10px; box-shadow:0 0 25px rgba(0,0,0,0.08); }
@media (max-width: 768px) { input { width: 90% !important; margin: 0 auto 25px auto !important; } }
</style>
</head>
<body>

<h2>Matriz Quântica da Vida</h2>
Nome completo igual a certidão<input id="nome" placeholder="">
Data de nascimento<input type="date" id="data">

<button onclick="gerar()">GERAR AS MATRIZES</button>
<button onclick="abrirPremium()">LIBERAR O RELATÓRIO E BAIXAR O PDF</button>

<div class="folhaRelatorio">
    <div id="resultado"></div>
    <div class="abas">
        <button onclick="mostrarAba('principal')">Principal / Vida</button>
        <button onclick="mostrarAba('pessoal')">Pessoal</button>
        <button onclick="mostrarAba('social')">Social</button>
        <button onclick="mostrarAba('destino')">Influência e Propósito</button>
    </div>

    <div id="aba_principal" class="aba" style="display:block"></div>
    <div id="aba_pessoal" class="aba"></div>
    <div id="aba_social" class="aba"></div>
    <div id="aba_destino" class="aba"></div>
</div>

<script src="textos.js"></script>

<script>
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 6;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let linhas=[base];
    while(base.length>1){
        let nova=[];
        for(let i=0;i<base.length-1;i++){ nova.push(reduzir(base[i]+base[i+1])); }
        linhas.push(nova);
        base=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// === SINCRONIZADOR DE TEMPO (O SEGREDO DO CÁLCULO) ===
function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    const IDADE_MAX = 100;

    while (idade < IDADE_MAX) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;

        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        let fim = new Date(atual);

        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: fim.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa, linhasDaPiramide) {
    let html = "<div class='box'><h3>⏳ Vigências e Alertas de Fluxo</h3>";
    
    const { posNeg } = detectarSequencias(linhasDaPiramide);
    const posEsp = detectarPosicoesEspeciais(linhasDaPiramide);
    const posFin = detectarSequenciaFinanceira(linhasDaPiramide);

    cronograma.forEach((periodo) => {
        let indiceTopo = periodo.indiceArcano % arcanosDaPiramide.length;
        let numArcano = arcanosDaPiramide[indiceTopo];
        
        // Filtramos TODAS as ocorrências nas colunas desta potência (índice e índice + 1)
        const todasNeg = posNeg.filter(p => p.indice === indiceTopo || p.indice === indiceTopo + 1);
        const todasEsp = posEsp.filter(p => p.indice === indiceTopo || p.indice === indiceTopo + 1);
        const todasFin = posFin.filter(p => p.indice === indiceTopo || p.indice === indiceTopo + 1);

        html += `<div class="box">
                 <h3 style="margin-top:0; color:#111827;">🔹 Potência ${numArcano}</h3>
                 <b>Idade:</b> ${periodo.idadeIni} → ${periodo.idadeFim} anos<br>
                 <b>Período:</b> ${periodo.ini} - ${periodo.fim}<br><br>
                 <p>${textosMapa[numArcano] || "<i>Interpretação em análise.</i>"}</p>`;

        // --- VARREDURA DE TODAS AS NEGATIVAS (VERMELHAS) ---
        // Usamos um Set para não repetir o mesmo número se ele aparecer em várias linhas da mesma coluna
        let negEncontradas = new Set();
        todasNeg.forEach(p => negEncontradas.add(linhasDaPiramide[p.linha][p.indice]));
        
        negEncontradas.forEach(n => {
            html += `<div style="color:#d32f2f; font-weight:bold; border-left:4px solid #ff6b6b; padding:8px; background:#fff5f5; margin-top:5px; font-size:14px;">
                        ⚠️ ALERTA NEGATIVO (${n}): ${textosSeqNeg[n] || "Desafio vibracional detectado."}
                     </div>`;
        });

        // --- VARREDURA DE TODAS AS ESPECIAIS (DOURADAS) ---
        let espEncontradas = new Set();
        todasEsp.forEach(p => {
            let l = p.linha; let i = p.indice;
            let possivel = "" + linhasDaPiramide[l][i] + (linhasDaPiramide[l][i+1]??'') + (linhasDaPiramide[l][i+2]??'');
            for(let chave in sequenciasEspeciais) {
                if(possivel.includes(chave)) { espEncontradas.add(chave); break; }
            }
        });

        espEncontradas.forEach(s => {
            html += `<div style="color:#b8860b; font-weight:bold; border-left:4px solid #f6c445; padding:8px; background:#fffdf5; margin-top:5px; font-size:14px;">
                        ⭐ IMPACTO ESPECIAL (${s}): ${sequenciasEspeciais[s]}
                     </div>`;
        });

        // --- VARREDURA FINANCEIRA (VERDE) ---
        if(todasFin.length > 0) {
            html += `<div style="color:#2e7d32; font-weight:bold; border-left:4px solid #34c759; padding:8px; background:#f5fff5; margin-top:5px; font-size:14px;">
                        💰 FINANCEIRO (99/9): Fluxo de prosperidade ativo nesta fase.
                     </div>`;
        }

        html += `</div>`;
    });
    return html + "</div>";
}

// === DETECTORES ===
function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

const sequenciasEspeciais = {
    "116": `Este é um estágio onde sua imagem pública e reputação podem ser postas à prova...`,
    "123": `Uma fase brilhante se aproxima, trazendo o justo reconhecimento...`,
    "252": `O cenário vibracional indica uma fase de encerramento em vínculos afetivos...`,
    "575": `Prepare-se para um período de reviravoltas súbitas na segurança material...`,
    "757": `Você está entrando em um ciclo de transformações intensas...`,
    "922": `A sorte e o mérito caminham juntos nesta fase para vitórias em concursos...`,
    "923": `Um período de profunda paz e entendimento reina em seu ambiente doméstico...`,
    "924": `Suas conexões sociais ganham um novo nível de prestígio e autoridade...`,
    "925": `O momento exige olhos atentos e discernimento redobrado com quem confia...`,
    "926": `Seus laços familiares serão convocados para uma ação de cuidado e paciência...`,
    "927": `Fique alerta para movimentações de bastidores e segredos do passado...`
};

function detectarPosicoesEspeciais(linhas){
    let pos=[];
    linhas.forEach((linha,i)=>{
        for(let j=0;j<linha.length-2;j++){
            let seq = "" + linha[j] + linha[j+1] + linha[j+2];
            if(sequenciasEspeciais[seq]){ pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i, indice:j+2}); }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta=false){
    let classe = compacta ? "piramide compacta" : "piramide";
    const neg = detectarSequencias(linhas).posNeg;
    const esp = detectarPosicoesEspeciais(linhas);
    const fin = detectarSequenciaFinanceira(linhas);

    let html=`<div class="${classe}">`;
    linhas.forEach((linha,i)=>{
        html += `<div class="linha">`;
        linha.forEach((n,j)=>{
            let c = "num";
            if(neg.some(p=>p.linha===i && p.indice===j)) c+=" negativo";
            if(esp.some(p=>p.linha===i && p.indice===j)) c+=" especial";
            if(fin.some(p=>p.linha===i && p.indice===j)) c+=" financeiro";
            html += `<div class="${c}">${n}</div>`;
        });
        html += `</div>`;
    });
    return html + `</div>`;
}

function gerarRelatorioNegativasCompacto(linhas){
    const s = [...new Set(detectarSequencias(linhas).sequencias.map(x=>x.numero))];
    let h = `<div class="box"><h3>⚠️ Negativas</h3>`;
    if(s.length===0) h+=`<p>Nenhuma.</p>`;
    else s.forEach(n=> h+=`<p><b>${n}</b> — ${textosSeqNeg[n] || 'Ver textos.js'}</p>`);
    return h+"</div>";
}

function gerarRelatorioEspeciaisCompacto(linhas){
    let encontradas = new Set();
    linhas.forEach(l => { for(let i=0;i<l.length-2;i++){ let c=""+l[i]+l[i+1]+l[i+2]; if(sequenciasEspeciais[c]) encontradas.add(c); }});
    let h = `<div class="box"><h3>⭐ Especiais</h3>`;
    if(encontradas.size===0) h+=`<p>Nenhuma.</p>`;
    else encontradas.forEach(s=> h+=`<p><b>${s}</b> — ${sequenciasEspeciais[s]}</p>`);
    return h+"</div>";
}

function gerarRelatorioFinanceiroCompacto(linhas){
    const f = detectarSequenciaFinanceira(linhas);
    return `<div class="box"><h3>💰 Financeiro</h3><p>${f.length>0 ? 'Sequência 99/9 detectada.' : 'Não detectado.'}</p></div>`;
}

function piramidePessoal(baseNome, dia) { 
    return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); 
}
function piramideSocial(baseNome, mes) { 
    return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); 
}
function piramideDestino(baseNome, dia, mes) { 
    return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); 
}

function mostrarAba(nome){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+nome).style.display="block";
}

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);

    // 1. Pirâmide da Vida
    const pVida = piramide(base);
    const aVida = topo(base);
    const crono = gerarCronogramaMestre(aVida, data);
    const reg = pVida.at(-1)[0];

    // Montamos o HTML da Aba Principal (AQUI ESTÁ O SEGREDO: passar pVida no final)
    const htmlPrincipal = desenhar(pVida, true) + 
        `<div class="box"><h3>Regente ${reg}</h3>${textosVida[reg] || ''}</div>` +
        `<div class="gridRelatorios">${gerarRelatorioNegativasCompacto(pVida)}${gerarRelatorioEspeciaisCompacto(pVida)}${gerarRelatorioFinanceiroCompacto(pVida)}</div>` +
        montarVigenciasSincronizadas(crono, aVida, textosVida, pVida);
    
    document.getElementById("aba_principal").innerHTML = htmlPrincipal;

    // 2. Pirâmide Pessoal
    const pPes = piramidePessoal(base, d);
    const htmlPessoal = desenhar(pPes, true) + montarVigenciasSincronizadas(crono, topo(pPes[0]), textosPessoal, pPes);
    document.getElementById("aba_pessoal").innerHTML = htmlPessoal;

    // 3. Pirâmide Social
    const pSoc = piramideSocial(base, m);
    const htmlSocial = desenhar(pSoc, true) + montarVigenciasSincronizadas(crono, topo(pSoc[0]), textosSocial, pSoc);
    document.getElementById("aba_social").innerHTML = htmlSocial;

    // 4. Pirâmide de Destino
    const pDes = piramideDestino(base, d, m);
    const htmlDestino = desenhar(pDes, true) + montarVigenciasSincronizadas(crono, topo(pDes[0]), textosDestino, pDes);
    document.getElementById("aba_destino").innerHTML = htmlDestino;

    // --- AGORA SALVAMOS NO LOCALSTORAGE COM OS ALERTAS JÁ INCLUÍDOS ---
    const pacote = {
        nome: nome,
        data: data,
        piramidePrincipal: htmlPrincipal,
        piramidePessoal: htmlPessoal,
        piramideSocial: htmlSocial,
        piramideDestino: htmlDestino
    };
    localStorage.setItem("relatorioPiramide", JSON.stringify(pacote));

    mostrarAba('principal');
}
// === FIM DA FUNÇÃO GERAR ===

function abrirPremium(){
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return;
    const pacote = {
        nome, data,
        piramidePrincipal: document.getElementById("aba_principal").innerHTML,
        piramidePessoal: document.getElementById("aba_pessoal").innerHTML,
        piramideSocial: document.getElementById("aba_social").innerHTML,
        piramideDestino: document.getElementById("aba_destino").innerHTML
    };
    localStorage.setItem("relatorioPiramide", JSON.stringify(pacote));
    window.open("https://hemricciinstintosuperior-rcci.github.io/Matriz_quantica_da_vida/piramide-premium.html","_blank");
}

document.oncontextmenu=()=>false;
document.onselectstart=()=>false;

 </script>
