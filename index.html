<style>
body{
  font-family: Arial;
  background:#ffffff;
  color:#000;
  text-align:center;
}

input,button{
  padding:10px;
  margin:5px;
  border-radius:6px;
  border:none;
}
/* campos de nome e data maiores */
input{
  width:600px;
  font-size:18px;
  padding:14px;
}
button{
  background:#facc15;
  font-weight:bold;
  cursor:pointer;
}

#resultado{
  margin-top:20px;
}

/* PIRÂMIDE NORMAL (tela) */
.piramide{
  font-family: monospace;
  font-size:12px;
  line-height:1.6;
  text-align:center;
}

/* 🔥 PIRÂMIDE COMPACTA (PDF / caber na tela) */
.piramide.compacta{
  font-size:12px;
  line-height:1.2;
}

.piramide.compacta .linha{
  gap:4px;
  margin:2px;
}

.piramide.compacta .num{
  padding:4px 6px;
  border-radius:6px;
  font-size:11px;
}

.linha{
  display:flex;
  justify-content:center;
  gap:6px;
  margin:2px;
}

.num{
  background:#28d3ee;
  color:#000;
  padding:4px 7px;
  border-radius:6px;
  font-weight:bold;
  font-size:12px;
  min-width:18px;
}

/* 🔴 SEQUÊNCIAS NEGATIVAS */
.negativo{
  background:#FF0000!important;
  color:#fff !important;
  box-shadow:0 0 6px rgba(255,0,0,0.6);
}
.botaoSeq{
  background:#ef4444;
  color:#fff;
  padding:10px 16px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:20px;
}
.boxSeq{
  background:#fff0f0;
  border:2px solid #ff4d4d;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
}

.box{
  background:#ffffff;
  border:2px solid #000;
  padding:15px;
  margin:15px auto;
  border-radius:10px;
  max-width:800px;
}

/* ===== GRID RELATÓRIOS LADO A LADO ===== */
.gridRelatorios{
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:20px;
  margin-top:25px;
}

@media(max-width:900px){
  .gridRelatorios{
    grid-template-columns:1fr;
  }
}  
  .abas{
  margin-top:20px;
}

.abas button{
  background:#22d3ee;
  border:none;
  padding:10px 15px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.aba{
  margin-top:20px;
}

.num.negativo{
  background:#ff6b6b;
  color:white;
  font-weight:bold;
}

.num.especial{
  background:#f6c445;
  color:#000;
  font-weight:bold;
  box-shadow:0 0 10px rgba(246,196,69,0.8);
}

.num.financeiro{
  background:#34c759;
  color:white;
  font-weight:bold;
  box-shadow:0 0 12px rgba(52,199,89,0.9);
}

.botaoSeq.especial{
    background:#0000FF;

.relatorioTopo{
  text-align:center;
  padding-top:60px;
  padding-bottom:30px;

.logoRelatorio{

.folhaRelatorio{

  padding:50px;

/* rodapé fixo impressão */
@media print{

  body{
    background:white !important;
  }

  .rodapeRelatorio{
    position:fixed;
    bottom:8mm;
    right:12mm;
    font-size:9px;
    color:#777;
  }
/* VERSÃO AUTOMÁTICA PARA PDF */
@media print{

  .piramide{
    transform: scale(0.60);
    transform-origin: top center;
    margin-top: 20mm;
  }

}
}
</style>

function valorLetra(letra){

  if(!letra || letra===" ") return 0;

  // separa letra e acentos
  let normal = letra.normalize("NFD");

  let base = normal[0];
  let acentos = normal.slice(1);

  let valorBase = mapa[base] ?? 0;

  let somaAcentos = 0;
  let multAcentos = 1;

  for(let a of acentos){

    if(a === "\u0301") somaAcentos += 2;      // agudo
    else if(a === "\u0302") somaAcentos += 7; // circunflexo
    else if(a === "\u0303") somaAcentos += 3; // til
    else if(a === "\u0327") somaAcentos += 6; // cedilha

    else if(a === "\u0300") multAcentos *= 2; // grave
    else if(a === "\u0308") multAcentos *= 2; // trema
  }

  return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
  while(n>9){
    n=n.toString().split('').reduce((a,b)=>+a+ +b,0);
  }
  return n;
}

function nomeNumeros(nome){
  nome=nome.toUpperCase();
  let arr=[];
  for(let l of nome){
    if(l===" ")continue;
    let v=valorLetra(l);
    if(v)arr.push(v);
  }
  return arr;
}

function piramide(base){
  let linhas=[base];
  while(base.length>1){
    let nova=[];
    for(let i=0;i<base.length-1;i++){
      nova.push(reduzir(base[i]+base[i+1]));
    }
    linhas.push(nova);
    base=nova;
  }
  return linhas;
}

function desenhar(linhas, compacta=false){

  const analise = detectarSequencias(linhas);
  const posNeg = analise.posicoes;

  const posEsp = detectarPosicoesEspeciais(linhas);

  // 💰 FINANCEIRA (99 com 9 abaixo)
  const posFin = detectarSequenciaFinanceira(linhas);

  function ehNegativo(i,j){

  }

  function ehEspecial(i,j){
    return posEsp.some(p => p.linha===i && p.indice===j);
  }

  function ehFinanceiro(i,j){
    return posFin.some(p => p.linha===i && p.indice===j);
  }

  let html=`<div class="${classe}">`;

      if(ehFinanceiro(i,j)) classeNum += " financeiro";

  }

  return posicoes;
}


function vigencias(arcanos,data){

  let lista=[];

  // corrigir fuso
  const [ano, mes, dia] = data.split("-").map(Number);
  let atual = new Date(ano, mes-1, dia);

  let idade = 0;
  let indice = 0; // <- posição dentro da pirâmide

  const IDADE_MAX = 100; // pode mudar para 120 ou 150

  while(idade < IDADE_MAX){

    // pega potência atual da pirâmide (loop infinito)
    let a = arcanos[indice];

    // duração da potência (mesma regra que você já usa)
    let anos = parseInt(a.toString()[0]);
    if(anos === 0) anos = 1;

    let inicio = new Date(atual);
    atual.setFullYear(atual.getFullYear()+anos);
    let fim = new Date(atual);

    lista.push({
      num:a,
      idadeIni:idade,
      idadeFim:idade+anos,
      ini:inicio.toLocaleDateString('pt-BR'),
      fim:fim.toLocaleDateString('pt-BR')
    });

    idade += anos;

    // 🔁 aqui está o segredo do ciclo infinito
    indice = (indice + 1) % arcanos.length;
  }

  return lista;
}

// gera pirâmide aplicando um fator (dia / mês / destino)
// o fator entra SOMENTE na soma dos pares
function piramideComFator(baseNome, fator){

  let base = baseNome.map(n => reduzir(n + fator));
  let linhas=[base];

  while(base.length>1){
    let nova=[];
    for(let i=0;i<base.length-1;i++){
      nova.push(reduzir(base[i]+base[i+1]));
    }
    linhas.push(nova);
    base=nova;
  }

  return linhas;
}

// ===== PIRÂMIDE PESSOAL (DIA)
function piramidePessoal(baseNome,dia){
  let fator = reduzir(dia);
  return piramideComFator(baseNome,fator);
}

// ===== PIRÂMIDE SOCIAL (MÊS)
function piramideSocial(baseNome,mes){
  let fator = reduzir(mes);
  return piramideComFator(baseNome,fator);
}

// ===== PIRÂMIDE DESTINO (DIA + MÊS)
function piramideDestino(baseNome,dia,mes){
  let fator = reduzir(reduzir(dia) + reduzir(mes));
  return piramideComFator(baseNome,fator);
}

// 🔴 DETECTOR DE SEQUÊNCIAS NEGATIVAS
// =====================================
function detectarSequenciasNegativas(linhas){

  let contagem = {}; // {numero: quantidade}

  linhas.forEach(linha=>{
    linha.forEach(num=>{
      contagem[num] = (contagem[num] || 0) + 1;
    });
  });

  let sequencias = [];

  for(let num in contagem){
    if(contagem[num] >= 3){
      sequencias.push(Number(num));
    }
  }

  return sequencias;
}

const sequenciasEspeciais = {
  "116":"Possível difamação, perda de prestígio ou credibilidade.",
  "123":"Recebimento de honraria ou reconhecimento.",
  "252":"Possível separação conjugal ou perda do cônjuge.",
  "575":"Mudanças inesperadas e perdas materiais.",
  "757":"Mudanças forçando evolução pessoal.",
  "922":"Favorecimento em concursos e disputas.",
  "923":"Período de harmonia familiar e amizades.",
  "924":"Ascensão social e contatos influentes.",
  "925":"Cuidado com amigos ou subordinados.",
  "926":"Necessidade de auxílio familiar.",
  "927":"Intrigas, escândalos ou segredos revelados."
};

function detectarSequenciasEspeciais(linhas){

  let encontradas = new Set();

  linhas.forEach(linha => {

    for(let i=0; i < linha.length-2; i++){

      let codigo = "" + linha[i] + linha[i+1] + linha[i+2];

      if(sequenciasEspeciais[codigo]){
        encontradas.add(codigo);
      }

    }
  });

  return Array.from(encontradas);
}

// 💰 DETECTOR SEQUÊNCIA FINANCEIRA (99 com 9 abaixo)
function detectarSequenciaFinanceira(linhas){

  let posicoes = [];

  for(let i=0;i<linhas.length-1;i++){

    let linhaAtual = linhas[i];
    let linhaBaixo = linhas[i+1];

    for(let j=0;j<linhaAtual.length-1;j++){

      // encontrou 99
      if(linhaAtual[j]===9 && linhaAtual[j+1]===9){

        // posição do número abaixo (centro)
        if(linhaBaixo[j]===9){

          // marca os 3 números
          posicoes.push({linha:i, indice:j});
          posicoes.push({linha:i, indice:j+1});
          posicoes.push({linha:i+1, indice:j});
        }
      }
    }
  }

  return posicoes;
}

function gerarRelatorioEspeciais(piramide){

  // usa a MESMA detecção da pirâmide

function gerarRelatorioSequencias(linhas, textosSeq){

  const analise = detectarSequencias(linhas);
  const sequencias = analise.sequencias;

  // remover duplicadas (se aparecer em várias linhas)
  const numerosUnicos = [...new Set(sequencias.map(s => s.numero))];

  // se não existir nenhuma sequência
  if(numerosUnicos.length === 0){
    return `
      <div class="box">
        <h3>✨ Nenhuma sequência negativa encontrada</h3>
        <p>Não foram identificadas repetições numéricas negativas nesta pirâmide.</p>
      </div>
    `;
  }

  let html = `<h2>⚠️ Sequências Numéricas Negativas</h2>`;

  numerosUnicos.forEach(num => {
    html += `
      <div class="box">
        <h3>Sequência de ${num}</h3>
        <p>${textosSeq[num] ?? "Texto não cadastrado."}</p>
      </div>
    `;
  });

  return html;
}
