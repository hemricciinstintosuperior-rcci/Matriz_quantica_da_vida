<style>
/* Reset de Impressão para o PDF não sair "zoado" */
@media print {

.container-master {

}

/* Grade das Pirâmides */
.grid-quatro-piramides {

    margin: 40px 0;
}

.bloco-piramide {

    border-radius: 10px;
    padding: 15px;
    text-align: center;
    background: #fff;
}

.bloco-piramide h3 {

    color: #827108;
    text-transform: uppercase;
    margin-bottom: 10px;
}

/* Estilo do Bloco Único de Texto */
.card-integrado {
    border-left: 6px solid #827108;
    background: #fdfdfd;
    margin-bottom: 30px;
    border-radius: 0 15px 15px 0;
    overflow: hidden;
}

.titulo-ciclo {

.input-group {

.input-group input {

.input-group input:focus {

.botoes-acao {

.btn-gerar, .btn-pdf {

.btn-pdf {

}

.btn-gerar:hover, .btn-pdf:hover {

/* Estilo da Pirâmide - Igual ao Estudo Numerológico */
.piramide {
    display: flex;
    flex-direction: column;

    gap: 5px;
    margin: 20px 0;

}

.piramide .linha {
    display: flex;
    justify-content: center;
    gap: 10px; /* Espaço entre os números na mesma linha */
}

.piramide .num {
    width: 15px;
    height: 15px;
    display: flex;
    align-items: center;
    justify-content: center;

}

/* Cores de destaque para as sequências (se quiser usar) */
.num.negativo { background-color: #ffcccc; color: #d32f2f; border-color: #d32f2f; }
.num.especial { background-color: #fff3cd; color: #856404; border-color: #856404; }
.num.financeiro { background-color: #d4edda; color: #155724; border-color: #155724; }

/* Para as pirâmides menores no topo */
.compacta {
    transform: scale(0.8);
    margin: -10px 0;
}


    

@media (max-width: 600px) {
    .botoes-acao { grid-template-columns: 1fr; }
}


    
/* Celular */
@media (max-width: 768px) {
    .container-master { width: 100% !important; }

@media (max-width: 768px) {

@media print {

  <div class="card-input-premium">
    <div class="input-group">

<script src="textos.js"></script>

<script>
// 1. Função que limpa e personaliza qualquer texto que venha do banco
function personalizarTexto(texto) {
    if (!texto) return "";
    const nomeCompleto = document.getElementById("nome").value.trim();
    const primeiroNome = nomeCompleto.split(" ")[0] || "você";
    
    let processado = texto.replace(/você/g, `<strong>${primeiroNome}</strong>`);
    
    // Divide o texto por quebras de linha e cria parágrafos reais
    return processado.split('\n').map(paragrafo => {
        if(paragrafo.trim().length > 0) {
            return `<p style="text-align: left;">${paragrafo}</p>`;
        }
        return "";
    }).join("");
}
 
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 3;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let b = [...base];
    let linhas=[b];
    while(b.length>1){
        let nova=[];
        for(let i=0;i<b.length-1;i++){ nova.push(reduzir(b[i]+b[i+1])); }
        linhas.push(nova);
        b=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// --- FUNÇÃO DE APOIO: CÁLCULO LINEAR VERTICAL ---
function calcularVigenciaLinearVertical(coluna, tamanhoSeq, cronograma, arcanosTopo) {
    let detalhes = [];
    // Cada número da sequência pega a potência da sua própria coluna no topo
    for (let i = 0; i < tamanhoSeq; i++) {
        let indiceColuna = coluna + i;
        let arcRef = arcanosTopo[indiceColuna]; 
        let periodo = cronograma.find(p => p.indiceArcano === indiceColuna);
        
        if (periodo) {
            detalhes.push({
                potencia: arcRef,
                duracao: parseInt(arcRef.toString()[0]) || 1,
                idadeIni: periodo.idadeIni,
                idadeFim: periodo.idadeFim
            });
        }
    }
    return detalhes;
}

function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

function calcularPeriodoSequencia(periodoBase, duracaoTotal) {

    let [dia, mes, ano] = periodoBase.ini.split("/").map(Number);

    let dataIni = new Date(ano, mes - 1, dia);
    let dataFim = new Date(dataIni);

    dataFim.setFullYear(dataFim.getFullYear() + duracaoTotal);

    return {
        ini: dataIni.toLocaleDateString('pt-BR'),
        fim: dataFim.toLocaleDateString('pt-BR')
    };
}
 


// --- FLUXO FINANCEIRO (Agora lê o topo) ---
function gerarRelatorioFinanceiroComVigencia(linhas, crono, bancoTxt, topoVida) {
    let h = `<div class="blocoRelatorio"><h2 style="color:#2e7d32;"> Fluxo Financeiro  💰</h2>`;
    let encontrou = false;
    
    linhas.forEach((linha, i) => {
        // REMOVIDO: if (i === 0) return; -> O topo pode ter sequências 99
        for (let j = 0; j < linha.length - 1; j++) {
            if (linha[j] === 9 && linha[j + 1] === 9) {
                encontrou = true;
                let duracaoTotal = 0;
                let offset = Math.floor(i / 2);
                
                for (let k = 0; k < 2; k++) {
                    let colReal = j + offset + k;
                    if (colReal < topoVida.length) {
                        duracaoTotal += parseInt(topoVida[colReal].toString()[0]) || 0;
                    }
                }
                
                let periodo = crono[j + offset] || crono[0];
                let idadeIni = periodo.idadeIni;
                let idadeFim = idadeIni + duracaoTotal;
                 let datas = calcularPeriodoSequencia(periodo, duracaoTotal);
let dataIni = datas.ini;
let dataFim = datas.fim;
             
                h += `<div class="blocoRelatorio" style="border-left:5px solid #2e7d32; padding-center:10px; margin-bottom:20px;">
                        <b style="text-align:center; font-size:18px;">✅ Sequência Financeira 99/9</b><br>
                       <span style="text-align:center; color:#111827;">📅 Data: de ${dataIni} até ${dataFim}</span><br>
                        <span style="font-weight:bold; text-align:center; color:#2e7d32;">Vigência: ${duracaoTotal} anos (dos ${idadeIni} aos ${idadeFim} anos)</span>
                        <p>${personalizarTexto(bancoTxt[999])}</p>
                      </div>`;
            }
        }
    });
    return encontrou ? h + "</div>" : "";
}


function montarSecaoMatriz(titulo, matriz, bancoDeTextos, introPiramide) {
    // 1. Identifica o Regente (o último número da ponta da pirâmide)
    const ultimaLinha = matriz[matriz.length - 1];
    const regente = ultimaLinha[0];
    
    // 2. Busca o resultado específico (1 ao 9) no banco de textos que passamos
    const resultadoTexto = bancoDeTextos[regente] || "Resultado não encontrado para este número.";

    let h = `
    <div class="page evitar-corte" style="margin-top: 30px; border-bottom: 1px solid #eee; padding-bottom: 40px;">
        <h2 style="text-align:center; color:#827108; text-transform: uppercase; letter-spacing: 2px;">Matriz de ${titulo}</h2>
        
        <div class="texto-introducao" style="font-style: italic; color: #555; margin-bottom: 20px;">
            ${personalizarTexto(introPiramide)}
        </div>

        <div style="margin: 20px 0;">
            ${desenhar(matriz)}
        </div>

        <div class="resultado-regente-container" style="background: #fdfaf0; border: 1px solid #e6d5a8; border-radius: 12px; padding: 25px; margin-top: 20px;">
            <h3 style="color: #827108; margin-top: 0; display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 24px;">🔱</span> 
                RESULTADO DO REGENTE ${regente} - ${titulo}
            </h3>
            <div class="texto-resultado-pratico" style="font-size: 16px; line-height: 1.7; color: #333;">
                ${personalizarTexto(resultadoTexto)}
            </div>
        </div>
    </div>`;
    return h;
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

function detectarPosicoesEspeciais(linhas, bancoEsp){
    let pos=[];
    // Se não vier um banco específico, tenta pegar o global
    const esp = bancoEsp || window.sequenciasEspeciais || {};
    
    linhas.forEach((linha, i) => {
        for(let j=0; j < linha.length - 2; j++){
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if(esp[seq]){ 
                pos.push({linha:i, indice:j}, {linha:i, indice:j+1}, {linha:i, indice:j+2}); 
            }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta = false) {
    let classe = compacta ? "piramide compacta" : "piramide";
    let html = `<div class="${classe}">`;

    linhas.forEach((linha) => {
        // ESSA DIV 'LINHA' É O QUE FAZ FICAR UM DO LADO DO OUTRO
        html += `<div class="linha">`; 
        linha.forEach((n) => {
            html += `<div class="num">${n}</div>`;
        });
        html += `</div>`;
    });

    html += `</div>`;
    return html;
}

function piramidePessoal(baseNome, dia) { return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); }
function piramideSocial(baseNome, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); }
function piramideDestino(baseNome, dia, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); }


function gerarSinteseFinal(v, p, s, d, bancoSintese) {
    let h = `<div class="blocoRelatorio" style="border: 2px solid #fff; background: #fdfeff;">
       <h1 style="color:#6366f1; text-align:center; margin-bottom: 20px;">▼ Resultado da Dinâmica entre as Matrizes ▼</h1>`;
             
    
    let matches = [];
    // Verificação das 6 combinações de sincronia
    if (p === v) matches.push({id: "pessoal_vida", tit: "Sincronia Pessoal e Vida  👤➛👑"});
    if (s === v) matches.push({id: "social_vida", tit: "Sincronia Social e Vida  🌎➛👑"});
    if (d === v) matches.push({id: "destino_vida", tit: "Sincronia Destino e Vida  ☄️➛👑"});
    if (p === s) matches.push({id: "pessoal_social", tit: "Sincronia Pessoal e Social  👤➛🌎"});
    if (p === d) matches.push({id: "pessoal_destino", tit: "Sincronia Pessoal e Destino  👤➛☄️"});
    if (s === d) matches.push({id: "social_destino", tit: "Sincronia Social e Destino  🌎➛☄️"});

    // 1. PARTE: CONEXÕES ESPECÍFICAS (As que geram os emojis grandes)
    if (matches.length > 0) {
        matches.forEach(m => {
            let txt = (bancoSintese && bancoSintese[m.id]) ? bancoSintese[m.id] : "Análise de conexão em processamento...";
            h += `<div class="blocoRelatorio" style="border-center:5px solid #fff; background:#f1f5f9; padding:15px; margin-bottom:15px; border-radius: 0 8px 8px 0;">
                    <b style="font-size:20px; color: #6366F1;">🔗 ${m.tit}</b><br>
                    <p style="margin:8px 0 0 0; line-height:1.5;">${personalizarTexto(txt)}</p>
                  </div>`;
        });
    }

    // 2. PARTE: ASSINATURA GERAL PERSONALIZADA
    h += `<hr style="border-center:5px; border-top:1px dashed #4338ca; margin:25px 0;">`;
    
    const conjunto = new Set([v, p, s, d]);
    let resumoGeral = "";
    let detalhesMistos = "";

    if (conjunto.size === 1) {
        resumoGeral = bancoSintese["convergencia_total"];
    } else if (conjunto.size === 4) {
        resumoGeral = bancoSintese["autonomia_total"];
    } else {
        // EQUILÍBRIO MISTO - Aqui entra a sua personalização!
        resumoGeral = bancoSintese["equilibrio_misto"];
        
        // Adiciona detalhes específicos baseados no que deu igual
        if (p === s) detalhesMistos += bancoSintese["misto_pessoal_social  👤⬌🌎"] || "";
        if (p === d) detalhesMistos += bancoSintese["misto_pessoal_destino  👤⬌☄️"] || "";
        if (p === v) detalhesMistos += bancoSintese["misto_pessoal_vida  👤⬌👑"] || "";
        if (s === d) detalhesMistos += bancoSintese["misto_social_destino  🌎⬌☄️"] || "";
    }

    h += `<div style="margin-top:20px; padding:10px; border:1px solid #e2e8f0; border-radius:8px; background:#f1f5f9;">
           <b style="color:#6366f1;">Análise de Fluxos Combinados:</b>
           ${personalizarTexto(detalhesMistos || `<p>Quando as pirâmides apresentam números totalmente distintos entre si, forma-se um conjunto de potências que operam de maneira independente. Isso indica uma estrutura energética marcada pela autonomia entre os campos pessoal, social e de destino.</p>

<p>Nesse tipo de configuração, cada força atua por si, sem exercer influência direta sobre as demais. Como resultado, a jornada de você tende a apresentar grande versatilidade e múltiplas direções possíveis.</p>

<p>No entanto, essa independência também torna a experiência de vida mais complexa e cheia de nuances. você pode perceber que suas decisões, sentimentos e percepções nem sempre seguem um padrão previsível.</p>

<p>Em muitos momentos, você pode sentir uma coisa, enxergar outra realidade e ser conduzida por estímulos internos ou externos difíceis de explicar. Isso cria uma dinâmica existencial rica, porém profundamente multifacetada.</p>

<p>A ausência de influência direta entre os campos não significa falta de movimento, mas sim um fluxo mais sutil e não linear. Assim, a vida se desenvolve de forma natural, guiada por interações complexas entre percepção, experiência e influências mais amplas do universo.</p>`)}
            </div>
    <div style="text-align:center; padding: 10px;">
            <b style="text-align:center; font-size:20px; color:#002663; display:block; margin-bottom:10px;">📋 Assinatura Geral do Relatório</b>
            <div style="text-align:center; font-size:20px; line-height:1.7; color:#334155;">
                ${personalizarTexto(resumoGeral)}
            </div>
            
                <div class="capa-transicao">
        <h3>PIRAMIDE DA VIDA</h3>
        <h2>👑</h2>
        <h2>Matriz Pincipal<br> Regente e seus Ciclos de potências</h2>
            
    </div>
    
          </div>`;

    return h + "</div>";
}


function gerarLoopIntegrado(mV, mP, mS, mD, crono) {
    let h = "";
    const topoV = topo(mV[0]);
    const topoP = topo(mP[0]);
    const topoS = topo(mS[0]);
    const topoD = topo(mD[0]);

    crono.forEach((periodo, i) => {
        const pV = topoV[periodo.indiceArcano] || topoV[topoV.length-1];
        const pP = topoP[periodo.indiceArcano] || topoP[topoP.length-1];
        const pS = topoS[periodo.indiceArcano] || topoS[topoS.length-1];
        const pD = topoD[periodo.indiceArcano] || topoD[topoD.length-1];

        h += `
        <div class="card-integrado evitar-corte">
            <div class="titulo-ciclo">Ciclo: ${periodo.idadeIni} a ${periodo.idadeFim} anos (${periodo.ini} a ${periodo.fim})</div>
            <div class="conteudo-vibracoes">
                <div class="vibracao-row"><b>👑 VIDA (Potência ${pV})</b>${personalizarTexto(textosVida[pV])}</div>
                <div class="vibracao-row"><b>👤 PESSOAL (Potência ${pP})</b>${personalizarTexto(textosPessoal[pP])}</div>
                <div class="vibracao-row"><b>🌎 SOCIAL (Potência ${pS})</b>${personalizarTexto(textosSocial[pS])}</div>
                <div class="vibracao-row"><b>☄️ DESTINO (Potência ${pD})</b>${personalizarTexto(textosDestino[pD])}</div>
            </div>
        </div>`;
    });
    return h;
}
