/* --- ESTILO DA PIRÂMIDE --- */
.piramide.compacta { font-size: 10px; line-height: 0.80; padding: 5px 0; display: inline-block; }

 /* Esta regra faz o HTML respeitar as quebras de linha do seu textos.js */

}   
/* Cor Padrão (Ciano) */
.linha { 
    display: flex; 
    justify-content: center; 
    gap: 2px; /* Diminua este valor para encurtar a largura total */

.num {

    /* CONTROLE DE LARGURA AQUI: */

    font-weight: bold;

/* 🟥 SEQUÊNCIA NEGATIVA (Vermelho Vivo) */

    color: #ffffff !important; 
    box-shadow: 0 0 8px rgba(255, 0, 0, 0.6) !important; 
}

/* 🟨 SEQUÊNCIA ESPECIAL (Amarelo Brilhante) */
.num.especial { 
    background-color: #b8860b !important; /* Adicionado !important aqui */
    color: #fff !important; 
    box-shadow: 0 0 10px rgba(255, 255, 0, 0.9) !important;
    border: 1px solid #b8860b !important;
}

/* 🟩 FLUXO FINANCEIRO (Verde) */
.num.financeiro { 
    background-color: #34c759 !important; 
    color: #ffffff !important; 
    box-shadow: 0 0 10px rgba(52, 199, 89, 0.9) !important;  
}

background:#ffffff;
border:2px solid #000;
padding:15px;
margin:15px 0;
border-radius:10px;
width:100%;
max-width:100%;

@media(min-width: 768px) { .abas { display: block; } .abas button { width: auto; display: inline-block; } }
@media(max-width: 768px) { .piramide.compacta { font-size: 3.2vw; } .num { padding: 4px 1.5vw; } }

<script src="textos.js"></script>

<script>
// 1. Função que limpa e personaliza qualquer texto que venha do banco
function personalizarTexto(texto) {
    if (!texto) return "";
    const nomeCompleto = document.getElementById("nome").value.trim();
    const primeiroNome = nomeCompleto.split(" ")[0] || "você";
    
    // Procura por "de você" e troca pelo nome real do usuário em negrito
    return texto.replace(/você/g, `<strong>${primeiroNome}</strong>`);
}
 
const mapa = { A:1,I:1,Q:1,J:1,Y:1, B:2,K:2,R:2, C:3,G:3,L:3,S:3, D:4,M:4,T:4, E:5,H:5,N:5, U:6,V:6,W:6,X:6, O:7,Z:7, F:8,P:8 };

function valorLetra(letra){
    if(!letra || letra===" ") return 0;
    let normal = letra.normalize("NFD");
    let base = normal[0];
    let acentos = normal.slice(1);
    let valorBase = mapa[base] ?? 0;
    let somaAcentos = 0, multAcentos = 1;
    for(let a of acentos){
        if(a === "\u0301") somaAcentos += 2;
        else if(a === "\u0302") somaAcentos += 7;
        else if(a === "\u0303") somaAcentos += 3;
        else if(a === "\u0327") somaAcentos += 6;
        else if(a === "\u0300") multAcentos *= 2;
        else if(a === "\u0308") multAcentos *= 2;
    }
    return (valorBase + somaAcentos) * multAcentos;
}

function reduzir(n){
    while(n>9){ n=n.toString().split('').reduce((a,b)=>+a+ +b,0); }
    return n;
}

function nomeNumeros(nome){
    nome=nome.toUpperCase();
    let arr=[];
    for(let l of nome){ if(l!==" "){ let v=valorLetra(l); if(v)arr.push(v); } }
    return arr;
}

function piramide(base){
    let b = [...base];
    let linhas=[b];
    while(b.length>1){
        let nova=[];
        for(let i=0;i<b.length-1;i++){ nova.push(reduzir(b[i]+b[i+1])); }
        linhas.push(nova);
        b=nova;
    }
    return linhas;
}

function topo(base){
    let arcanos = [];
    for(let i=0; i<base.length-1; i++){ arcanos.push(parseInt("" + base[i] + base[i+1])); }
    return arcanos;
}

// --- FUNÇÃO DE APOIO: CÁLCULO LINEAR VERTICAL ---
function calcularVigenciaLinearVertical(coluna, tamanhoSeq, cronograma, arcanosTopo) {
    let detalhes = [];
    // Cada número da sequência pega a potência da sua própria coluna no topo
    for (let i = 0; i < tamanhoSeq; i++) {
        let indiceColuna = coluna + i;
        let arcRef = arcanosTopo[indiceColuna]; 
        let periodo = cronograma.find(p => p.indiceArcano === indiceColuna);
        
        if (periodo) {
            detalhes.push({
                potencia: arcRef,
                duracao: parseInt(arcRef.toString()[0]) || 1,
                idadeIni: periodo.idadeIni,
                idadeFim: periodo.idadeFim
            });
        }
    }
    return detalhes;
}

function gerarCronogramaMestre(arcanosVida, data) {
    let cronograma = [];
    const [ano, mes, dia] = data.split("-").map(Number);
    let atual = new Date(ano, mes - 1, dia);
    let idade = 0, contadorCiclo = 0;
    while (idade < 100) {
        let indice = contadorCiclo % arcanosVida.length;
        let arc_ref = arcanosVida[indice];
        let anosDuracao = parseInt(arc_ref.toString()[0]);
        if (anosDuracao === 0 || isNaN(anosDuracao)) anosDuracao = 1;
        let inicio = new Date(atual);
        atual.setFullYear(atual.getFullYear() + anosDuracao);
        cronograma.push({
            idadeIni: idade, idadeFim: idade + anosDuracao,
            ini: inicio.toLocaleDateString('pt-BR'), fim: atual.toLocaleDateString('pt-BR'),
            indiceArcano: indice 
        });
        idade += anosDuracao;
        contadorCiclo++;
    }
    return cronograma;
}

// 2. RELATÓRIO DE NEGATIVAS
function gerarRelatorioNegativasComVigencia(linhas, crono, bancoTxt) {
    const { posNeg } = detectarSequencias(linhas);
    if (!posNeg || posNeg.length === 0) return "";
    let h = `<div class="box"><h2 style="color:#d32f2f;">⚠️ Sequências Negativas</h2>`;
    let gruposContados = new Set();
    
    posNeg.forEach(p => {
        let num = linhas[p.linha][p.indice];
        // O idUnico agora é apenas o NÚMERO, para não repetir 555 várias vezes
        if (!gruposContados.has(num)) {
            gruposContados.add(num);
            
            let duracaoTotal = 0;
            // Pegamos a idade inicial da primeira coluna e final da última coluna da sequência
            let idadeInicio = crono.find(c => c.indiceArcano === p.indice).idadeIni;
            let idadeFim = crono.find(c => c.indiceArcano === p.indice + 2).idadeFim;
            
            // CÁLCULO DO TÚNEL VERTICAL (Soma apenas o primeiro dígito da potência no topo)
            for (let i = 0; i < 3; i++) {
                let col = p.indice + i;
                let arcTopo = linhas[0][col]; 
                if (arcTopo) {
                    // Pega o primeiro dígito (Ex: 54 vira 5, 13 vira 1)
                    duracaoTotal += parseInt(arcTopo.toString()[0]) || 0;
                }
            }

            let textoFormatado = personalizarTexto(bancoTxt[num] || "Desafio detectado.");
            h += `<div style="margin-bottom:15px; border-left:4px solid #ff6b6b; padding-left:10px;">
                    <b style="font-size:18px;">🚫 Sequência ${num}</b><br>
                    <span style="color:#555;">Vigência: ${duracaoTotal} anos (dos ${idadeInicio} aos ${idadeFim} anos)</span><br>
                    <p style="margin-top:5px; font-size:16px;">${textoFormatado}</p>
                  </div>`;
        }
    });
    return h + "</div>";
}
// 3. RELATÓRIO DE ESPECIAIS
// --- INÍCIO DA LINHA 254 (SEQUÊNCIAS ESPECIAIS) ---
function gerarRelatorioEspeciaisComVigencia(linhas, crono, bancoTxt) {
    let h = `<div class="box"><h2 style="color:#b8860b;">⚡️ Sequências Especiais</h2>`;
    let gruposContados = new Set();
    let encontrou = false;
    
    linhas.forEach((linha, i) => {
        for (let j = 0; j < linha.length - 2; j++) {
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            
            // Só entra se a sequência existir no seu banco e não tiver sido contada
            if (bancoTxt && bancoTxt[seq] && !gruposContados.has(seq)) {
                encontrou = true;
                gruposContados.add(seq);
                
                let duracaoTotal = 0;
                let idadeInicio = crono.find(c => c.indiceArcano === j).idadeIni;
                let idadeFim = crono.find(c => c.indiceArcano === j + 2).idadeFim;
                
                // SOBE O TÚNEL VERTICAL (3 colunas)
                for (let k = 0; k < 3; k++) {
                    let col = j + k;
                    let arcTopo = linhas[0][col]; 
                    if (arcTopo) {
                        duracaoTotal += parseInt(arcTopo.toString()[0]) || 0;
                    }
                }

                h += `<div style="margin-bottom:15px; border-left:4px solid #b8860b; padding-left:10px;">
                        <b style="font-size:18px;">✨ Impacto ${seq}</b><br>
                        <span style="color:#555;">Duração: ${duracaoTotal} anos (dos ${idadeInicio} aos ${idadeFim} anos)</span><br>
                        <p style="margin-top:5px; font-size:16px;">${personalizarTexto(bancoTxt[seq])}</p>
                      </div>`;
            }
        }
    });
    return encontrou ? h + "</div>" : "";
}

function gerarRelatorioFinanceiroComVigencia(linhas, crono, bancoTxt) {
    const posFin = detectarSequenciaFinanceira(linhas);
    if (!posFin || posFin.length === 0) return "";
    let h = `<div class="box"><h2 style="color:#2e7d32;">💰 Fluxo Financeiro</h2>`;
    let contados = new Set();
    
    posFin.forEach(p => {
        // Trava para mostrar apenas uma vez o 999
        if (!contados.has(999)) {
            contados.add(999);
            
            let duracaoTotal = 0;
            let idadeInicio = crono.find(c => c.indiceArcano === p.indice).idadeIni;
            let idadeFim = crono.find(c => c.indiceArcano === p.indice + 1).idadeFim;
            
            // SOBE O TÚNEL VERTICAL (2 colunas para o 99)
            for (let i = 0; i < 2; i++) {
                let col = p.indice + i;
                let arcTopo = linhas[0][col];
                if (arcTopo) {
                    duracaoTotal += parseInt(arcTopo.toString()[0]) || 0;
                }
            }

            h += `<div style="margin-bottom:15px; border-left:4px solid #34c759; padding-left:10px;">
                    <b style="font-size:18px;">✅ Sequência Financeira 99/9</b><br>
                    <span style="color:#555;">Duração: ${duracaoTotal} anos (dos ${idadeInicio} aos ${idadeFim} anos)</span><br>
                    <p style="margin-top:5px; font-size:16px;">${personalizarTexto(bancoTxt[999])}</p>
                  </div>`;
        }
    });
    return h + "</div>";
}



// 2. Nova versão da montarConteudoComIntros (Ajustada para processar os textos)
function montarConteudoComIntros(linhas, regente, txtReg, crono, txtVig, nomePiramide, txtNeg, txtEsp, txtFin) {
    let html = "";

    /* TÍTULO + PIRÂMIDE */
    html += `<div class="box">`;
    html += `<h2>${nomePiramide}</h2>`;
    html += desenhar(linhas, true, txtEsp);
    html += `</div>`;

    let tipo = "vida";
    if(nomePiramide.includes("Pessoal")) tipo = "pessoal";
    if(nomePiramide.includes("Social")) tipo = "social";
    if(nomePiramide.includes("Destino")) tipo = "destino";

    const intro = window.introsPiramides ? window.introsPiramides[tipo] : {};

    /* REGENTE (Personalizado) */
    if(intro.regente) {
        html += `<div class="box">${personalizarTexto(intro.regente)}</div>`;
    }
    if(txtReg && txtReg[regente]) {
        html += `<div class="box">${personalizarTexto(txtReg[regente])}</div>`;
    }

    /* NEGATIVAS (Personalizado dentro da função original) */
    const relNeg = gerarRelatorioNegativasComVigencia(linhas, crono, txtNeg);
    if(relNeg) {
        if(intro.negativas) html += `<div class="box">${personalizarTexto(intro.negativas)}</div>`;
        html += personalizarTexto(relNeg);
    }

    /* ESPECIAIS (Personalizado) */
    const relEsp = gerarRelatorioEspeciaisComVigencia(linhas, crono, txtEsp);
    if(relEsp) {
        if(intro.especiais) html += `<div class="box">${personalizarTexto(intro.especiais)}</div>`;
        html += personalizarTexto(relEsp);
    }

    /* FINANCEIRO (Personalizado) */
    const relFin = gerarRelatorioFinanceiroComVigencia(linhas, crono, txtFin);
    if(relFin) {
        if(intro.financeiro) html += `<div class="box">${personalizarTexto(intro.financeiro)}</div>`;
        html += personalizarTexto(relFin);
    }

    /* VIGÊNCIAS (Personalizado) */
    if(crono) {
        if(intro.vigencias) html += `<div class="box">${personalizarTexto(intro.vigencias)}</div>`;
        html += montarVigenciasSincronizadas(crono, topo(linhas[0]), txtVig);
    }

    return html;
}

// 3. Nova versão da montarVigenciasSincronizadas
function montarVigenciasSincronizadas(cronograma, arcanosDaPiramide, textosMapa) {
    let html = "<div class='box'><h2>⏳ Fluxo das Potências Quânticas</h2>";
    
    cronograma.forEach((periodo) => {
        let indiceTopo = periodo.indiceArcano % arcanosDaPiramide.length;
        let numArcano = arcanosDaPiramide[indiceTopo];
        
        // Pega o texto e já passa pela personalização
        let textoFinal = personalizarTexto(textosMapa[numArcano] || `<i>Interpretação da Potência ${numArcano} em análise.</i>`);

        html += `<div class="blocoRelatorio" style="text-align:center; border-left: 5px solid #111827;">
                 <h2 style="margin:0; color:#111827;">✡︎ Potência ${numArcano}</h2>
                 <span style="margin:0; color:#111827;"> 📅 Período: de ${periodo.ini} até ${periodo.fim} </span><br>
                 <span style="color: #111827; font-weight: normal;">🔍 de ${periodo.idadeIni} a ${periodo.idadeFim} anos de idade</span>
                 <div style="font-size:18px; margin-top:15px; text-align:left; color:#333;">
                    ${textoFinal}
                 </div>
                 </div>`;
    });
    
    return html + "</div>";
}

function detectarSequencias(linhas){
    let posNeg=[]; let sequencias=[];
    linhas.forEach((linha, i)=>{
        let cont=1;
        for(let j=1;j<linha.length;j++){
            if(linha[j] === linha[j-1]) cont++;
            else {
                if(cont>=3){
                    sequencias.push({numero: linha[j-1], repeticoes: cont});
                    for(let k=j-cont;k<j;k++) posNeg.push({linha:i,indice:k});
                }
                cont=1;
            }
        }
        if(cont>=3){
            sequencias.push({numero: linha[linha.length-1], repeticoes: cont});
            for(let k=linha.length-cont;k<linha.length;k++) posNeg.push({linha:i,indice:k});
        }
    });
    return {sequencias, posNeg};
}

function detectarPosicoesEspeciais(linhas, bancoEsp){
    let pos=[];
    // Se não vier um banco específico, tenta pegar o global
    const esp = bancoEsp || window.sequenciasEspeciais || {};
    
    linhas.forEach((linha, i) => {
        for(let j=0; j < linha.length - 2; j++){
            let seq = "" + linha[j] + linha[j + 1] + linha[j + 2];
            if(esp[seq]){ 
                pos.push({linha:i, indice:j}, {linha:i, indice:j+1}, {linha:i, indice:j+2}); 
            }
        }
    });
    return pos;
}

function detectarSequenciaFinanceira(linhas){
    let pos=[];
    for(let i=0; i<linhas.length-1; i++){
        for(let j=0; j<linhas[i].length-1; j++){
            if(linhas[i][j]===9 && linhas[i][j+1]===9 && linhas[i+1][j]===9){
                pos.push({linha:i, indice:j},{linha:i, indice:j+1},{linha:i+1, indice:j});
            }
        }
    }
    return pos;
}

function desenhar(linhas, compacta = false, bancoEsp = null) {
    let classe = compacta ? "piramide compacta" : "piramide";
    
    // Busca as posições de cada tipo de destaque
    const neg = (typeof detectarSequencias === 'function') ? detectarSequencias(linhas).posNeg : [];
    const esp = (typeof detectarPosicoesEspeciais === 'function') ? detectarPosicoesEspeciais(linhas, bancoEsp) : [];
    const fin = (typeof detectarSequenciaFinanceira === 'function') ? detectarSequenciaFinanceira(linhas) : [];

    let html = `<div class="${classe}">`; // Variável criada como 'html'

    linhas.forEach((linha, i) => {
        html += `<div class="linha">`;
        linha.forEach((n, j) => {
            let classes = ["num"];

            // Verifica se a posição deve ser colorida
            if (neg.some(p => p.linha === i && p.indice === j)) classes.push("negativo");
            if (fin.some(p => p.linha === i && p.indice === j)) classes.push("financeiro");
            if (esp.some(p => p.linha === i && p.indice === j)) classes.push("especial");

            html += `<div class="${classes.join(' ')}">${n}</div>`;
        });
        html += `</div>`;
    });

    html += `</div>`;
    return html; // Retorno corrigido para 'html' (sem o número 1)
}

function piramidePessoal(baseNome, dia) { return piramide(baseNome.map(n => reduzir(n + reduzir(dia)))); }
function piramideSocial(baseNome, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(mes)))); }
function piramideDestino(baseNome, dia, mes) { return piramide(baseNome.map(n => reduzir(n + reduzir(reduzir(dia) + reduzir(mes))))); }

function mostrarAba(nome){
    document.querySelectorAll('.aba').forEach(a=>a.style.display='none');
    document.getElementById("aba_"+nome).style.display="block";
}

function gerar() {
    const nome = document.getElementById("nome").value;
    const data = document.getElementById("data").value;
    if(!nome || !data) return alert("Preencha os dados!");

    const base = nomeNumeros(nome);
    const [y, m, d] = data.split("-").map(Number);
    const pVida = piramide(base);
    const aVida = topo(base);
    const crono = gerarCronogramaMestre(aVida, data);
    
// Agora o montarConteudo já coloca as intros nos lugares certos individualmente

const htmlVida = explicacoes.principal + montarConteudoComIntros(
pVida,
pVida.at(-1)[0],
textosVida,
crono,
textosVida,
"Matriz da Vida",
textosSeqNegVida,
textosSeqEspVida,
textosFinVida

);

const htmlPessoal = explicacoes.pessoal + montarConteudoComIntros(
piramidePessoal(base, d),
piramidePessoal(base, d).at(-1)[0],
textosPessoal,
crono,
textosPessoal,
"Matriz Pessoal",
textosSeqNegPessoal,
textosSeqEspPessoal,
textosFinPessoal

);

const htmlSocial = explicacoes.social + montarConteudoComIntros(
piramideSocial(base, m),
piramideSocial(base, m).at(-1)[0],
textosSocial,
crono,
textosSocial,
"Matriz Social",
textosSeqNegSocial,
textosSeqEspSocial,
textosFinSocial

);

const htmlDestino = explicacoes.destino + montarConteudoComIntros(
piramideDestino(base, d, m),
piramideDestino(base, d, m).at(-1)[0],
textosDestino,
crono,
